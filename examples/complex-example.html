function toggleChat(){const panel=document.getElementById('chatPanel');panel.classList.toggle('open');if(panel.classList.contains('open')){maybeProbeConnection();if(!chatMsgs.length)addChatMsg('system','Hi! I can help you chat with your DoView Board. Ask me anything about the board. For instance: "What boxes should I do first". "Create a text box under [the following box on page X]". "Add a new page called X". "Move the column on the left of the X page to the right of the second column". "For any box that has something in Notes 1, put that in its text box". The speed of the chat\u2019s response can be slow inside an AI chat panel. It generally is faster if you look at a DoView Board in a browser and connect it to an AI system with an API key.');}}
function toggleChatSettings(){chatSettingsOpen=!chatSettingsOpen;document.getElementById('chatSettingsPane').classList.toggle('open',chatSettingsOpen);document.getElementById('chatMsgs').style.display=chatSettingsOpen?'none':'';document.getElementById('chatInputArea').style.display=chatSettingsOpen?'none':'';if(chatSettingsOpen){maybeProbeConnection();document.getElementById('setEP').value=aiSettings.endpoint||'';document.getElementById('setModel').value=aiSettings.model||'';document.getElementById('setKey').value='';}}
function addChatMsg(role,text){chatMsgs.push({role,text});const msgs=document.getElementById('chatMsgs');if(!msgs)return;const div=document.createElement('div');div.className=`chat-m ${role}`;div.innerHTML=renderMd(text);msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}
function renderMd(text){return linkify(text.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\*\*(.*?)\*\*/g,'<strong>$1</strong>').replace(/\*(.*?)\*/g,'<em>$1</em>')).replace(/\n/g,'<br>');}

function buildBoardStatePrompt(fullBoard,structural){let s=`You are a helpful assistant with full awareness of this DoView board: "${TITLE}".\nDOVIEW RULES: Boxes=outcome statements ending \u2026ed. STRICT RULE: NEVER use auxiliary-verb forms (were/was/is/are/have been/will be/has been) in This\u2013Then box labels \u2014 always use compact DoView outcome phrasing instead. Examples of CORRECT compact phrasing: "Predators, browsers and weeds controlled at priority sites", "Funding secured", "Risks identified early". Examples of WRONG auxiliary-verb phrasing that must be rewritten: "were controlled", "was secured", "are identified", "is in place", "have been completed". If you find yourself producing a label with were/was/is/are/have been, STOP and rewrite it in compact DoView form before emitting it. This rule applies BOTH when building new boards AND when editing existing ones \u2014 if an existing box already uses auxiliary-verb phrasing, you should rewrite it into compact form. L\u2192R=earlier\u2192later causal flow. Cols=causal stages named descriptively not generically. Column headings label the stage only \u2014 not extra boxes; if a heading reads like a missing box, rewrite it or make it a box. Vary col/row counts by real-world domain logic. No templates. Avoiding one banned shape is not enough: do not add populated pages with repeated or near-matching geometry such as 4-4-4-4 / 4-4-4-3 unless the domain genuinely requires it. Do not achieve anti-stereotype variation by overloading final/right-hand columns with many terminal outcomes; ordinary This–Then pages usually end with 1–3 page-level terminal outcomes, 4 needs a domain reason, and 5+ should be rare. Distinguish these page-level terminal outcomes from the board-level Final Outcomes page. Include assumptions/risks phrased positively. One concept per box. Multiple final outcomes allowed.\n\nV1.0.14.0 (Fix 1) BOARD-CHAT INTENT CLASSIFICATION. Before generating any actions, classify the user's request silently into ONE of these intents:\n  (1) question / explanation only \u2014 the user is asking what something means, asking the board to explain something, asking for advice or a summary, or asking "what does this board say about X?". Answer in plain language. Do NOT propose structural edits. Do NOT emit ACTION tags unless the user clearly asks for a change.\n  (2) state-only edit \u2014 setLight / setPriority / addSofar / addNote / addNote1 / addNote2 / addNote3 / setDetail / clearDetail / setBoxBorder / clearBoxBorder / setBoardInfo / setPageInfo. Emit the ACTION tag and answer briefly in past tense (e.g. "Done").\n  (3) structural edit (existing pages/boxes/columns) \u2014 addBox / removeBox / renameBox / addColumn / removeColumn / renameColumn / moveColumn / removeSubpage / addFinalOutcome / removeFinalOutcome / addHowBox / removeHowBox / renameHowBox. Emit the ACTION tag(s) and explain in FUTURE TENSE.\n  (4) blank This\u2013Then page creation \u2014 the user explicitly asked for a "blank", "starter", "empty", or "page shell" This\u2013Then page. Emit just [ACTION:addSubpage:LABEL:this_then] without populating it.\n  (5) populated This\u2013Then page creation \u2014 see V1.0.13.2 (Fix 1) / V1.0.14.0 (Fix 3) below for the full populated-page rule.\n  (6) How page creation \u2014 the user explicitly asked for a How page. Emit [ACTION:addSubpage:LABEL:how]; the engine seeds 8 starter How boxes.\n  (7) Documentation page creation \u2014 the user explicitly asked for a Documentation page. Emit [ACTION:addSubpage:LABEL:documentation].\n  (8) ambiguous page creation \u2014 the user asked to add/create/make a page but did NOT specify the page type and did NOT clearly imply a populated This\u2013Then page. DO NOT emit any ACTION tags. Instead reply with the page-type clarification question (V1.0.14.0 Fix 2 below) and stop. Wait for the user's answer.\n  (9) invalid or incomplete action proposal \u2014 if you cannot generate a valid, complete action set (for example because a referenced box does not exist), explain the problem and ask the user for clarification rather than emitting partial ACTION tags.\nThe classification is invisible to the UI \u2014 you do not need to label your reply as "intent: 4" or similar. Just behave according to the classification.\n\nV1.0.14.0 (Fix 2) ASK PAGE TYPE WHEN PAGE CREATION IS AMBIGUOUS. If the user asks to add/create/make a page but does NOT clearly specify the page type AND does NOT clearly imply a populated This\u2013Then page (via "full DoView", "complete DoView", "full logic", "full populated page", "populate it", "add DoView This\u2013Then boxes", "create a This\u2013Then logic for X", "add a This\u2013Then page", or "add a page and fill it in"), reply with this exact wording (or preserve it very closely) and DO NOT emit any ACTION tag:\n\n  What type of page do you want?\n  - This\u2013Then page \u2014 shows what you want to happen in the world, and what leads to what.\n  - How page \u2014 shows what is going to be done.\n  - Documentation page \u2014 holds supporting notes, explanation and basic rich-text documentation about the DoView Board.\n\nThen STOP and wait for the user's answer. Do NOT create the page and ask the question at the same time. Do NOT default ambiguous page requests to This\u2013Then. Do NOT default ambiguous page requests to Documentation. After the user answers, propose the appropriate page.\n\nExamples of ambiguous requests that REQUIRE the page-type clarification question above (no ACTION tag emitted):\n  \u2022 "add a page called leadership development"\n  \u2022 "create a new page about leadership development"\n  \u2022 "make a page for leadership development"\n  \u2022 "add leadership development as a page"\n  \u2022 "add a starter page called leadership development" (page type missing \u2014 still ask)\n\nExamples that BYPASS the clarification (do NOT ask the page-type question; go ahead with the appropriate ACTION tags):\n  \u2022 "add a This\u2013Then page called leadership development"\n  \u2022 "add a How page called leadership development"\n  \u2022 "add a Documentation page called leadership development"\n  \u2022 "add a blank This\u2013Then page called leadership development" (blank with explicit type)\n  \u2022 "add a new page called leadership development which includes a full DoView on it" (populated trigger \u2014 see Fix 3)\n  \u2022 "add a complete DoView page about leadership development"\n  \u2022 "create a full logic for leadership development"\n  \u2022 "add a full populated page about leadership development"\n  \u2022 "make a page on leadership development with the full DoView logic"\n\n`;if(structural){s+=`\nFULL DOVIEW METHODOLOGY (apply when creating/restructuring content):\n- Extract all outcomes or steps to outcomes from the domain\n- Write as outcome statements using phrasing that tends to end with \u2026ed\n- STRICT: Do NOT write box labels with auxiliary-verb forms such as were / was / is / are / have been / will be / has been. Use compact DoView outcome phrasing instead. If you accidentally produce auxiliary-verb phrasing, REWRITE the label into compact form before emitting it. This applies both to newly created boxes and to any boxes you are editing or renaming.\n- Map This\u2192Then relationships: if achieving A tends to lead to B, A goes left of B\n- Keep boxes tight: one concept per box\n- World-centric: include external assumptions and risks, phrased positively\n- Not only quantifiable: do not restrict boxes to measurable items only\n- Avoid siloing: a left-side box can influence multiple right-side boxes\n- Columns = causal stages, named descriptively for the specific domain\n- Column headings label the causal stage only; they are not extra boxes. If a heading reads like a missing outcome, step, action, or condition, rewrite it or make it a box\n- Vary box counts: the number of boxes per column is determined by how many genuinely distinct outcomes occur at that causal stage in the real world, not by a template\n- Vary column counts: different subpages have different numbers of causal stages\n- Use qualifiers: adequate / sufficient / high-quality where appropriate\n- Final column boxes are bold (handled by engine)\n- When building or generating new boards, do not pre-assign non-neutral traffic lights or priorities unless the user explicitly asks for them. Leave traffic lights grey/unset and priorities empty by default.\n- When adding a subpage, always use [ACTION:addSubpage:LABEL:PAGE_TYPE] where PAGE_TYPE is this_then, how, or documentation. If the user has not specified a page type AND has not clearly implied a populated This\u2013Then page, ask the page-type clarification question (V1.0.14.0 Fix 2 above) BEFORE creating any page \u2014 do not guess a default. The engine auto-assigns colors \u2014 NEVER ask the user to choose colors.\n- V1.0.13.2 (Fix 1) / V1.0.14.0 (Fix 3) POPULATED vs BLANK This\u2013Then page rule. When the user asks the board chat to add a NEW This\u2013Then page about a topic AND has either explicitly named the type OR clearly triggered the populated-page behavior, this is a POPULATED-page request. Trigger phrasings include: "add a This\u2013Then page about X", "add a new This\u2013Then page about X", "populate it", "add DoView This\u2013Then boxes", "create a This\u2013Then logic for X", "add a page and fill it in", AND (V1.0.14.0 Fix 3) any phrasing using "full DoView", "complete DoView", "full logic", or "full populated page" \u2014 for example "add a new page called X which includes a full DoView on it", "add a complete DoView page about X", "create a full logic for X", "add a full populated page about X", "make a page on X with the full DoView logic". You MUST emit, in ONE response, the FULL set of action tags so the engine can apply the populated page in a single OK confirmation step:\n  * one [ACTION:addSubpage:LABEL:this_then]\n  * AT LEAST 3 columns total. The engine creates the new page with one default first column called "First Stage". Use [ACTION:renameColumn:NEW_PAGE_ID:0:NEW_HEADING] to rename it (column headings name causal stages \u2014 not generic "Stage 1, Stage 2") and emit AT LEAST 2 more [ACTION:addColumn:NEW_PAGE_ID:COLUMN_INDEX:HEADING] tags so the page has at least 3 columns total\n  * AT LEAST 6 boxes total spread across those columns via [ACTION:addBox:NEW_PAGE_ID:COLUMN_INDEX:LABEL] tags, using compact DoView outcome phrasing (no auxiliary-verb forms)\n  * Boxes flow left-to-right in plausible This\u2192Then causal order. Final/right-hand boxes represent later or higher-level outcomes for the page.\n- V1.0.14.0 (Fix 4) DOMAIN-SHAPED PAGE STRUCTURE. When you create a populated This\u2013Then page, the number of columns and the number of boxes in each column MUST reflect the actual causal structure of the domain being modelled. Do NOT use an arbitrary template such as 3 columns with 2 or 3 boxes each. Use as many causal stages as are genuinely needed for the domain. Vary the number of boxes per column according to how many distinct outcomes, conditions, or enabling steps exist at that stage. Column headings must name real causal stages \u2014 not generic labels such as "Stage 1", "Stage 2", "Inputs", "Activities", "Outputs" \u2014 unless those words are genuinely the best domain-specific headings. The "at least 3 columns and at least 6 boxes" rule above is a FLOOR, not a target or a template: a populated page about a domain that naturally has 4, 5, or more causal stages should have 4, 5, or more columns; if some columns naturally have 1 box and others naturally have 4, mirror that real-world variation. Mechanical "3 columns x 2 boxes" or "3 columns x 3 boxes" templates will be rejected by the engine.\n- Explicit type wins. If the user explicitly requests a How Page or Documentation Page, respect that explicit page type rather than forcing This\u2013Then \u2014 even if the message also contains "full DoView" or similar (e.g. "make a Documentation page with a full DoView" \u2192 still create a Documentation page, do NOT force This\u2013Then).\n- Predicting NEW_PAGE_ID for the addColumn / addBox / renameColumn tags: the engine assigns the new page id as p<SP.length+1>. Look at the FULL board state above to count the existing SP entries (p1, p2, p3, \u2026) and use the next free id. Emit ALL the addColumn, renameColumn and addBox tags in the same response, referencing that predicted NEW_PAGE_ID. The engine applies addSubpage first, so by the time the addColumn / addBox tags run, the new page exists with that id.\n- A one-box placeholder (just [ACTION:addSubpage:LABEL:this_then] with no addColumn/addBox tags) is NOT acceptable for a populated-page request. The engine will reject the change and ask you/the user to retry. Always emit the full populated structure in one response.\n- BLANK / starter pages: only when the user EXPLICITLY asks for a "blank", "starter", "empty", or "page shell" page may you emit just [ACTION:addSubpage:LABEL:this_then] without populating it. In that case the engine creates a blank starter page as before. If the user has stated a populated trigger (full DoView, full logic, populate it, etc.), treat it as POPULATED.\n- Worked example. Suppose the current board already has p1, p2, p3 and the user says "add a new page called staff retention which includes a full DoView on it". Then in ONE response, emit:\n    [ACTION:addSubpage:Staff retention:this_then]\n    [ACTION:renameColumn:p4:0:Causes addressed]\n    [ACTION:addColumn:p4:1:Conditions established]\n    [ACTION:addColumn:p4:2:Outcomes secured]\n    [ACTION:addBox:p4:0:Pay and conditions reviewed]\n    [ACTION:addBox:p4:0:Workload pressures eased]\n    [ACTION:addBox:p4:1:Career development pathways in place]\n    [ACTION:addBox:p4:1:Effective management strengthened]\n    [ACTION:addBox:p4:2:Voluntary turnover reduced]\n    [ACTION:addBox:p4:2:Workforce capability retained]\n  Use future tense ("a new This\u2013Then page will be added with three columns and six boxes\u2026") because the user must confirm before the change takes effect. Note that 3 columns and 6 boxes is the MINIMUM \u2014 if staff retention genuinely needs more causal stages or more boxes per column, use them.\n`;}if(fullBoard||currentPage==='overview'||currentPage==='final'){s+=`\nFull board state:\n`;SP.forEach(sp=>{s+=`\n[${sp.label} (id:${sp.id}, type:${sp.pageType||'this_then'})]\n`;if(sp.pageType==='how'&&sp.howBoxes){sp.howBoxes.forEach(hb=>{const k=`${sp.id}-${hb.id}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});}else{sp.cols.forEach((col,ci)=>{s+=`  Column ${ci+1}: "${col.h}"\n`;col.boxes.forEach((_,bi)=>{const k=`${sp.id}-c${ci}-b${bi}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});});}});}else{const sp=SP.find(p=>p.id===currentPage);if(sp){s+=`\nCurrent subpage [${sp.label} (id:${sp.id}, type:${sp.pageType||'this_then'})]:\n`;if(sp.pageType==='how'&&sp.howBoxes){sp.howBoxes.forEach(hb=>{const k=`${sp.id}-${hb.id}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});}else{sp.cols.forEach((col,ci)=>{s+=`  Column ${ci+1}: "${col.h}"\n`;col.boxes.forEach((_,bi)=>{const k=`${sp.id}-c${ci}-b${bi}`;const b=B[k];if(!b)return;const pri=b.priority?` [Pri:${b.priority}]`:'';const sf=b.entries.filter(e=>e.type==='sofar').map(e=>e.text).join('; ');const nt=b.entries.filter(e=>e.type==='note').map(e=>e.text).join('; ');const n1=b.entries.filter(e=>e.type==='note1').map(e=>e.text).join('; ');const n2=b.entries.filter(e=>e.type==='note2').map(e=>e.text).join('; ');const n3=b.entries.filter(e=>e.type==='note3').map(e=>e.text).join('; ');const dt=b.detailText||'';const bc=b.borderColor||'';s+=`    ${k} | ${b.light.toUpperCase()}${pri}: ${b.label}${sf?' \u2014 Notes 1: '+sf:''}${nt?' \u2014 Notes: '+nt:''}${n1?' \u2014 Notes1: '+n1:''}${n2?' \u2014 Notes2: '+n2:''}${n3?' \u2014 Notes3: '+n3:''}${dt?' \u2014 Detail: '+dt:''}${bc?' \u2014 Border: '+bc:''}\n`;});});}}s+=`\nOther subpages (say "whole board" to see full detail):\n`;SP.filter(p=>p.id!==currentPage).forEach(sp=>{const ks=Object.keys(B).filter(k=>k.startsWith(sp.id+'-'));const g=ks.filter(k=>B[k].light==='green').length;s+=`  ${sp.label} (${sp.id}, type:${sp.pageType||'this_then'}): ${ks.length} boxes, ${g} green\n`;});}s+=`\nFinal Outcomes:\n`;FO_DATA.forEach((label,i)=>{const b=B[`final-b${i}`];if(!b)return;s+=`  final-b${i} | ${b.light.toUpperCase()}: ${label}\n`;});s+=`\nBoard info: ${boardInfo||'(empty)'}\n`;s+=`\nPage info:\n`;SP.forEach(sp=>{const pi=pageInfo[sp.id]||'';if(pi)s+=`  ${sp.label} (${sp.id}): ${pi}\n`;});const fpi=pageInfo['final']||'';if(fpi)s+=`  Final Outcomes (final): ${fpi}\n`;const opi=pageInfo['overview']||'';if(opi)s+=`  Overview (overview): ${opi}\n`;const _bspDcKeys=Object.keys(docContent).filter(k=>docContent[k]);if(_bspDcKeys.length){s+='\nDocumentation page content:\n';_bspDcKeys.forEach(pid=>{const _dsp=SP.find(s2=>s2.id===pid);const _dlbl=_dsp?_dsp.label:pid;s+='  '+_dlbl+' ('+pid+'): '+docContent[pid].replace(/<[^>]*>/g,' ').substring(0,500)+'\n';});}if(ttLinks.length){s+='\nThis\u2013Then Links:\n';ttLinks.forEach(l=>{const fb=B[l.from];const tb=B[l.to];if(fb&&tb)s+=`  ${l.from} -> ${l.to} (${fb.label} -> ${tb.label})\n`;});}if(measures.length){s+='\nMeasures:\n';measures.forEach(m=>{const cnt=getBoxesLinkedToMeasure(m.id).length;s+='  '+m.id+': '+m.title+' ('+cnt+' associated)\n';});}if(evalQuestions.length){s+='\nEvaluation Questions:\n';evalQuestions.forEach(q=>{const cnt=getBoxesLinkedToEQ(q.id).length;s+='  '+q.id+': '+q.questionText+' ('+cnt+' associated)\n';});}if(howLinks.length){s+='\nHow Links:\n';howLinks.forEach(l=>{const fb=B[l.from];const tb=B[l.to];if(fb&&tb)s+=`  ${l.id}: ${l.from} -> ${l.to} (${fb.label} -> ${tb.label})\n`;});}s+=`\nYou can modify the board by including action commands in your response. Commands use the format [ACTION:command:arg1:arg2:...] on their own line.\nIMPORTANT: When talking to the user, refer to columns as Column 1, Column 2, etc. (1-based). In ACTION commands, use 0-based COLUMN_INDEX (Column 1 = index 0, Column 2 = index 1, etc.).\nIMPORTANT: ALWAYS include ACTION tags directly in your response for ANY board change. NEVER describe a change without including the ACTION tag. The JavaScript handles confirmation automatically for structural changes. EXCEPTION: V1.0.14.0 (Fix 1, Fix 2) \u2014 if the user is only asking a question or asking for an explanation, do NOT emit ACTION tags. If the user's page-creation request is ambiguous (no page type specified, no populated trigger), do NOT emit any ACTION tag \u2014 instead ask the page-type clarification question and wait.\nIMPORTANT: For structural changes (addBox, removeBox, addColumn, etc.), use FUTURE TENSE in your explanation because the user must confirm before the change takes effect. Say "A new box will be added" NOT "A new box has been added". Say "This column will be removed" NOT "This column has been removed". The confirmation dialog appears automatically \u2014 do NOT ask for permission in plain text.\n\nAvailable commands:\nState changes (execute immediately \u2014 use past tense: "Done", "Changed", etc.):\n  [ACTION:setLight:BOX_ID:COLOR] \u2014 set traffic light (green/greenYellow/yellow/yellowRed/red/grey)\n  [ACTION:setAllLights:COLOR] \u2014 set ALL boxes to a color\n  [ACTION:setSubpageLights:SUBPAGE_ID:COLOR] \u2014 set all boxes on a subpage\n  [ACTION:addSofar:BOX_ID:TEXT] \u2014 append a Notes 1 entry\n  [ACTION:addNote:BOX_ID:TEXT] \u2014 append a My Notes entry\n  [ACTION:addNote1:BOX_ID:TEXT] \u2014 append a Notes 1 entry\n  [ACTION:addNote2:BOX_ID:TEXT] \u2014 append a Notes 2 entry\n  [ACTION:addNote3:BOX_ID:TEXT] \u2014 append a Notes 3 entry\n  [ACTION:setPriority:BOX_ID:PRIORITY] \u2014 set priority (A/B/C/D/E/BAU or empty to clear)\n  [ACTION:clearEntries:BOX_ID:TYPE] \u2014 clear entries (sofar/note/note1/note2/note3/all)\n  [ACTION:setDetail:BOX_ID:TEXT] \u2014 set detail text box below a box (always visible on board)\n  [ACTION:clearDetail:BOX_ID] \u2014 remove detail text box\n  [ACTION:setBoxBorder:BOX_ID:COLOR] \u2014 set custom border color (2px, e.g. red, #ef4444)\n  [ACTION:clearBoxBorder:BOX_ID] \u2014 reset border to default\n  [ACTION:setSubpageBorders:SUBPAGE_ID:COLOR] \u2014 set all box borders on a subpage\n  [ACTION:clearSubpageBorders:SUBPAGE_ID] \u2014 reset all borders on a subpage\n  [ACTION:setBoardInfo:TEXT] \u2014 replace Board info content with TEXT\n  [ACTION:setPageInfo:PAGE_ID:TEXT] \u2014 replace Page info for PAGE_ID (e.g. p1, p2, final, overview) with TEXT\n\nStructural changes (user confirms before executing \u2014 use FUTURE TENSE in explanation):\n  [ACTION:addBox:SUBPAGE_ID:COLUMN_INDEX:LABEL]\n  [ACTION:removeBox:BOX_ID]\n  [ACTION:renameBox:BOX_ID:NEW_LABEL]\n  [ACTION:addColumn:SUBPAGE_ID:COLUMN_INDEX:HEADING]\n  [ACTION:removeColumn:SUBPAGE_ID:COLUMN_INDEX]\n  [ACTION:renameColumn:SUBPAGE_ID:COLUMN_INDEX:NEW_HEADING]\n  [ACTION:moveColumn:SUBPAGE_ID:FROM_INDEX:TO_INDEX] \u2014 move a column from one position to another (0-based indexes)\n  [ACTION:addSubpage:LABEL:PAGE_TYPE] \u2014 adds subpage. PAGE_TYPE is this_then, how, or documentation (default: this_then). When the user asks to add a page without a clear type and without a populated trigger, ASK the page-type clarification question (Fix 2) before emitting this command.\n  [ACTION:removeSubpage:SUBPAGE_ID]\n  [ACTION:addFinalOutcome:LABEL]\n  [ACTION:removeFinalOutcome:INDEX]\n\nHow Page commands (structural \u2014 user confirms):\n  [ACTION:addHowBox:SUBPAGE_ID:LABEL] \u2014 add a How box to a How page\n  [ACTION:removeHowBox:SUBPAGE_ID:HOW_ID] \u2014 remove a How box (e.g. H001)\n  [ACTION:renameHowBox:SUBPAGE_ID:HOW_ID:NEW_LABEL] \u2014 rename a How box\n\nThis\u2013Then Link commands (state changes \u2014 execute immediately):\n  [ACTION:addTTLink:FROM_BOX_ID:TO_BOX_ID] \u2014 add a ask the page-type clarification question first (V1.0.14.0 Fix 2). NEVER ask the user to choose colors \u2014 the engine assigns them automatically.\n- How page box IDs use the format SUBPAGE_ID-HXXX (e.g. p2-H001). State commands (setLight, addSofar, etc.) work on How boxes using these IDs.\n- V1.0.14.0 (Fix 1) If the user is asking a question, asking for an explanation, asking "what does this board say about\u2026", asking for advice, or asking for a summary, answer in plain language. Do NOT propose structural edits unless the user clearly asks for a change.`;return s;}

function buildMainTextSection(key){if(!B[key])return '';const box=B[key];const dt=box.detailText||'';return '<div class="ep-section"><div class="ep-section-hdr">Display text</div><textarea class="ep-ta" id="mainTextTa" style="min-height:50px;font-size:11px" placeholder="Text that can be shown under this box..." onblur="saveMainText(\''+key+'\')" onkeydown="if(event.ctrlKey&&event.key===\'Enter\')saveMainText(\''+key+'\')">'+escHtml(dt)+'</textarea></div>';}
function saveMainText(key){if(IS_READONLY)return;const ta=document.getElementById('mainTextTa');if(!ta||!B[key])return;B[key].detailText=ta.value;saveState();render();}
function buildJumpToPageSection(key){if(!B[key])return '';const isTT=!!key.match(/^p\d+-c\d+-b\d+$/);const isHow=!!key.match(/^p\d+-(H\d+)$/);const isFO=!!key.match(/^final-b\d+$/);if(!isTT&&!isHow&&!isFO)return '';const box=B[key];const cur=box.jumpToPage||'';const currentPageId=getSourcePageId(key)||'';let opts='<option value="">None</option>';const allPages=[{id:'overview',label:'Overview'},{id:'final',label:'Final Outcomes'},...SP.map(s=>({id:s.id,label:s.label}))];allPages.forEach(p=>{const isCurrent=p.id===currentPageId;const selected=cur===p.id&&!isCurrent;const label=p.label+(isCurrent?' (current page)':'');opts+='<option value="'+p.id+'"'+(selected?' selected':'')+(isCurrent?' disabled':'')+'>'+escHtml(label)+'</option>';});return '<div class="meq-section"><div class="meq-hdr">Jump to a page</div><div class="how-link-add"><select class="how-link-sel" id="jumpPageSel" style="flex:1">'+opts+'</select><button class="ep-sbtn" onclick="setJumpToPage(\''+key+'\')">Add jump</button>'+(cur?' <button class="ep-sbtn ep-del" onclick="clearJumpToPage(\''+key+'\')">Remove</button>':'')+'</div></div>';}
function setJumpToPage(key){if(IS_READONLY)return;const sel=document.getElementById('jumpPageSel');if(!sel||!sel.value||!B[key])return;if(sel.value===(getSourcePageId(key)||''))return;takeSnapshot();B[key].jumpToPage=sel.value;saveState();render();}

function buildTTLinksSection(key){if(!isTTBox(key))return '';const box=B[key];if(!box)return '';const links=ttLinks.filter(l=>l.from===key||l.to===key);let rows='';links.forEach(l=>{const otherKey=l.from===key?l.to:l.from;const otherBox=B[otherKey];if(!otherBox)return;const otherPage=getBoxPage(otherKey);const pageName=otherPage?otherPage.label:'';const fromLabel=l.from===key?box.label:otherBox.label;const toLabel=l.to===key?box.label:otherBox.label;rows+=`<div class="tt-link-row"><span class="tt-link-box" title="${escAttr(fromLabel)}">${escHtml(fromLabel)}</span><span class="tt-link-arrow" onclick="flipTTLink('${l.id}')" title="Click to reverse direction">\u2192</span><span class="tt-link-box" title="${escAttr(toLabel)}">${escHtml(toLabel)}</span><span class="tt-link-pg">(${escHtml(pageName)})</span><span class="link-info-btn" onclick="event.stopPropagation();openLinkDetail('${l.id}')" title="Link details">\u2139</span><span class="tt-link-rm" onclick="removeTTLink('${l.id}')">\u2715</span></div>`;});const picker=buildTTLinkPicker(key);return `<div class="tt-link-section"><div class="tt-link-hdr">Link to another This Then box</div>${rows||'<div style="font-size:10.5px;color:var(--text2);margin-bottom:6px;font-style:italic">No links yet</div>'}${picker}</div>`;}

// V1.0.12.6 (Fixes 5 + 6): render the temporary source-reference box. Heading depends on mode: on the destination page after a jump it reads 'Box jumped from'; on the destination page after a link-inspection / relationship-navigation cross-page hop it reads 'Box on other page linking to highlighted boxes below'; on the source page after the user has returned via the context box it reads 'Box currently highlighted on this page'. The return-to-source variant is the ONLY case in which the context box appears on the source page \u2014 ordinary manual tab navigation does not trigger it.
// V1.0.12.8 (Fixes 2 + 3 + 11): the ghost/context-box lifecycle is now treated as ONE coherent system, not a set of ad-hoc cases.
//   (a) Activation \u2014 inspect mode is entered by border-click (line ~700) or count-click (showTTLinksList /
//       showHowCountList / showWhyCountList / showDownwardHowList / showLateralHowList / showLateralHowOnTTList).
//       In all of those entry points, setSourceRefBox(key,'inspect') is called so the ghost/context box appears
//       IMMEDIATELY on the source page with the heading 'Showing links for this box on this page' (Fix 3).
//   (b) Persistence within the active context \u2014 the sourceRefBox object is kept alive across page navigation so
//       long as the inspect context (inspectHome / inspectLinkedKeys) remains active. Returning to a relevant
//       page (by clicking the link in the ghost/context box, by the in-pane inspectNavTo, or by the back/forward
//       page arrows) shows the ghost/context box again with the correct heading.

// ─── HOW LINK LEVEL CLASSIFICATION (V1.0.12.3) — strict adjacency ───
// FIX 1: only adjacent How-levels are hierarchical, and only Level-1 How→This–Then counts as hierarchical.
//        Anything else (same-level, skipped-level, Level-2+→TT, no-level) is lateral.
function getHowPageLevel(key){const m=key.match(/^(p\d+)/);if(!m)return null;const sp=SP.find(s=>s.id===m[1]);if(!sp||sp.pageType!=='how')return null;return sp.howLevel||null;}
function classifyHowLink(fromKey,toKey){
  if(isTTBox(toKey)){
    // Only Level-1 How boxes may hierarchically link to This–Then boxes.
    const fromLvl=getHowPageLevel(fromKey);
    if(fromLvl===1)return 'upward';
    return 'lateral';
  }
  if(!isHowBox(toKey))return 'lateral';
  const fromLvl=getHowPageLevel(fromKey);const toLvl=getHowPageLevel(toKey);
  if(fromLvl===null||fromLvl===undefined||toLvl===null||toLvl===undefined)return 'lateral';
  if(isSamePageHow(fromKey,toKey))return 'lateral';
  // Strict adjacency — only ±1 level counts as hierarchical.
  if(toLvl===fromLvl-1)return 'upward';
  if(toLvl===fromLvl+1)return 'downward';
  return 'lateral';
}

function getLateralHowCount(key){return howLinks.filter(l=>(l.from===key||l.to===key)&&_storedHowLinkClass(l)==='lateral').length;}

async function sendChat(){const inp=document.getElementById('chatIn');const msg=inp.value.trim();if(!msg)return;inp.value='';if(msg.toLowerCase()==='undo'){doUndo();return;}addChatMsg('user',msg);addThinking();const history=chatMsgs.slice(-10).filter(m=>m.role!=='system').map(m=>({role:m.role==='asst'?'assistant':m.role,content:m.text}));const wantsFull=/whole board|all pages|across the board|every page|every subpage|all subpages/i.test(msg);const wantsStructural=/add.*(page|subpage|box|column|how)|create|build|new page|new subpage|restructure|how page|how box/i.test(msg);const sysPmt=buildBoardStatePrompt(wantsFull,wantsStructural);
  await maybeProbeConnection();
  if(claudeConnected){try{const r=await fetch(ANTHROPIC_API,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:ANTHROPIC_MODEL,max_tokens:1200,system:sysPmt,messages:history,tools:[{type:'web_search_20250305',name:'web_search'}]})});if(r.ok){const d=await r.json();const raw=d.content.filter(b=>b.type==='text').map(b=>b.text).join('\n').replace(/]*>|<\/antml:cite>/g,'');if(raw){const clean=processAIResponse(raw,msg);if(clean){addChatMsg('asst',clean);chatMsgs[chatMsgs.length-1].role='asst';}}removeThinking();}else{removeThinking();addChatMsg('system','Unable to get a response. Please try again.');}}catch(e){removeThinking();addChatMsg('system','Connection error. Please check your network.');}}
  else if(aiSettings.endpoint&&aiSettings.key){try{const r=await fetch(aiSettings.endpoint,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${aiSettings.key}`},body:JSON.stringify({model:aiSettings.model||'gpt-4o',messages:[{role:'system',content:sysPmt},...history],max_tokens:1200})});if(r.ok){const d=await r.json();const raw=d.choices?.[0]?.message?.content||'';if(raw){const clean=processAIResponse(raw,msg);if(clean){addChatMsg('asst',clean);chatMsgs[chatMsgs.length-1].role='asst';}}removeThinking();}else{removeThinking();addChatMsg('system','API error. Check your settings.');}}catch(e){removeThinking();addChatMsg('system','Connection error. Check settings.');}}
  else{removeThinking();addChatMsg('system','No AI connected. Click ⚙️ to configure an API endpoint, or use this board within an AI chat that supports automatic connection.');}}

/* V1.0.84.0: API keys are session-only. The board never writes API keys to localStorage or embedded board state; remembered settings are limited to endpoint/model. Loading or saving settings also sanitizes any older doview_ai_settings value that may contain a stale key. Anthropic automatic probing is lazy and host-gated so opening a board in a non-Claude environment does not call Anthropic. */

async function testChatConn(){const ep=document.getElementById('setEP').value.trim();const key=document.getElementById('setKey').value.trim();const model=document.getElementById('setModel').value.trim()||'gpt-4o';const res=document.getElementById('connTestResult');res.textContent='Testing...';try{const r=await fetch(ep,{method:'POST',headers:{'Content-Type':'application/json','Authorization':`Bearer ${key}`},body:JSON.stringify({model,messages:[{role:'user',content:'hi'}],max_tokens:10})});res.textContent=r.ok?'✓ Connected successfully!':`Error: ${r.status} ${r.statusText}`;res.style.color=r.ok?'#22c55e':'#ef4444';}catch(e){res.textContent='Connection failed: '+e.message;res.style.color='#ef4444';}}

// Search page titles
SP.forEach(function(sp){if(sp.label.toLowerCase().indexOf(q)>=0){results.push({type:'Page title',page:sp.label,id:'',snippet:sp.label,action:'navTo(\''+sp.id+'\')'});}});

function buildLinkEQSection(linkId){var found=findLink(linkId);if(!found||found.type!=='this_then')return '';var l=found.link;ensureTTLinkMEQFields(l);var linked=l.evalQuestions||[];var items='';linked.forEach(function(eqId){var q=getEQ(eqId);if(!q)return;items+='<div class="meq-item"><span class="meq-item-id">'+displayEQId(q.id)+'</span><span class="meq-item-title" onclick="closeModal(\'linkDetailModal\');openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+tagHTMLForElement(q)+'</span><span class="meq-item-rm" onclick="unlinkEQFromTTLink(\''+q.id+'\',\''+linkId+'\')" title="Remove association">\u2715</span></div>';});var opts='<option value="">Select an evaluation question\u2026</option>';evalQuestions.forEach(function(q){if(!linked.includes(q.id))opts+='<option value="'+q.id+'">'+displayEQId(q.id)+' \u2014 '+escHtml(q.questionText)+'</option>';});return '<div class="ep-section"><div class="ep-section-hdr">Evaluation Questions</div>'+(items||'<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">No evaluation questions associated with this link.</div>')+'<div class="ep-compact-row"><select class="meq-sel" id="linkEQPicker">'+opts+'</select><button class="meq-abtn" onclick="addEQFromLinkPicker(\''+linkId+'\')" title="Associate with this structural link">Associate question</button><span class="meq-footer-link" onclick="closeModal(\'linkDetailModal\');openEQRegistry()">Manage evaluation questions</span></div></div>';}

    "boardInfo": "This is a deliberately complex example DoView Board. It demonstrates the V1.0.57.0 strengthened natural-shape, terminal-column guardrail, near-match, and causal-connectivity rules: a substantial topic is decomposed into distinct domains, causal pathways, implementation workstreams, measures, evaluation questions, and documentation notes without forcing every This–Then page into the same geometry or leaving causal boxes as disconnected inventory items. It is illustrative only and does not use public research. A real board should replace generic assumptions with local evidence and community input.",
    "pageInfo": {
      "overview": "Reference example only. The varied page geometry is intentional: each page is shaped by its causal domain rather than a repeated grid.",
      "p1": "Needs and assets are not treated as a neat four-column pathway because discovery, agreement, and targeting are uneven work.",
      "p2": "Household access uses a longer pathway because barriers, affordable choices, stress, and wellbeing are distinct stages.",
      "p3": "Supply reliability uses more stages because production, safeguards, continuity, dependable supply, and resilience are different causal moves.",
      "p4": "Distribution and service integration is deliberately narrower: the logic turns on roles, routines, and joined-up support.",
      "p5": "Participation combines leadership, skills, sustained participation, and ownership.",
      "p6": "Governance and learning includes accountability, resources, learning, adaptation, and viability.",
      "p7": "How page with implementation workstreams only. Links point upward to relevant This–Then outcomes.",
      "p8": "Documentation page for assumptions, evidence notes, and learning guidance."
    },
    "docContent": {
      "p8": "<h2>Purpose of this example</h2>\n<p>This Documentation page shows how a complex DoView Board can keep longer explanation outside compact boxes while still keeping the final board as one standalone HTML file.</p>\n<h2>Natural-shape note</h2>\n<p>The This–Then pages deliberately use different numbers of columns and boxes because the domains differ. This is not random irregularity: the need-mapping pathway is shorter, the supply pathway is longer, and governance has its own learning and sustainability sequence.</p>\n<h2>Assumptions to replace in a real board</h2>\n<ul>\n<li>Local food need, assets, and constraints should be checked with local evidence.</li>\n<li>Priority groups should be defined with community input and privacy safeguards.</li>\n<li>Measures should be refined so they are useful and not burdensome.</li>\n<li>Partner capacity and volunteer load should be reviewed before scaling.</li>\n</ul>\n<h2>Learning cycle</h2>\n<p>Use the measures and evaluation questions to revise workstreams, not just report activity. Evidence notes should be added close to the claims they support.</p>"
    },
