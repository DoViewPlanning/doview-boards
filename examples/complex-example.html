/* V1.0.15.1 (Fix 3): rebuildBoxKeys now accepts an optional keyMap argument mapping OLD positional box keys to NEW positional box keys (or to '' for deleted slots). When keyMap is supplied, B[] entries are captured by their OLD positions and placed at their NEW positions per the map, so each logical box keeps its label, light, entries, priority, hasSubpage, detailText, borderColor, jumpToPage, measures, evalQuestions, and uid even when its positional key shifts due to a splice. ttLinks/howLinks endpoints that point into this page through old positional keys are remapped through the same keyMap (and links whose endpoint resolves to '' are dropped). openBox / inspectHome / revealBox / inspectLinkedKeys / sourceRefBox.sourceKey are remapped through the same keyMap so the open detail panel and any active inspect/reveal/ghost-context state continue to track the correct logical box. After capture+placement, sp.cols is swept to ensure every visible position has a B[] entry — fresh entries (with a new uid) are created for newly-inserted slots. When keyMap is NOT supplied, the function falls back to the previous positional-only behavior for backward compatibility (label-only refreshes and any legacy callers that do not change positions). The cleanupTTLinks / cleanupHowLinks safety net runs at the end of both paths, so any link with a missing endpoint is dropped consistently. The build does NOT migrate links to uid-based references, does NOT change the saved-state schema, and does NOT touch How box behavior because How box reorder/insert/delete uses a different code path (cleanupHowLinks already handles it correctly). */
function rebuildBoxKeys(spId,keyMap){const sp=SP.find(s=>s.id===spId);if(!sp)return;if(keyMap&&typeof keyMap==='object'){const captured={};Object.keys(B).filter(k=>k.indexOf(spId+'-c')===0).forEach(k=>{captured[k]=B[k];delete B[k];});Object.keys(captured).forEach(oldK=>{let newK;if(Object.prototype.hasOwnProperty.call(keyMap,oldK)){newK=keyMap[oldK];}else{newK=oldK;}if(newK===''||newK==null)return;B[newK]=captured[oldK];});sp.cols.forEach((col,ci)=>{col.boxes.forEach((label,bi)=>{const k=`${spId}-c${ci}-b${bi}`;if(!B[k])B[k]={label,light:'grey',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[],uid:_genUid('box')};B[k].label=label;});});function _remap(k){if(k&&typeof k==='string'&&k.indexOf(spId+'-c')===0&&Object.prototype.hasOwnProperty.call(keyMap,k)){return keyMap[k];}return k;}if(typeof ttLinks!=='undefined'&&Array.isArray(ttLinks)){ttLinks.forEach(l=>{if(l&&l.from)l.from=_remap(l.from);if(l&&l.to)l.to=_remap(l.to);});ttLinks=ttLinks.filter(l=>l&&l.from&&l.to);}if(typeof howLinks!=='undefined'&&Array.isArray(howLinks)){howLinks.forEach(l=>{if(l&&l.from)l.from=_remap(l.from);if(l&&l.to)l.to=_remap(l.to);});howLinks=howLinks.filter(l=>l&&l.from&&l.to);}if(typeof openBox!=='undefined'&&openBox){const r=_remap(openBox);openBox=(r==='')?null:r;}if(typeof inspectHome!=='undefined'&&inspectHome){const r=_remap(inspectHome);inspectHome=(r==='')?null:r;}if(typeof revealBox!=='undefined'&&revealBox){const r=_remap(revealBox);revealBox=(r==='')?null:r;}if(typeof inspectLinkedKeys!=='undefined'&&Array.isArray(inspectLinkedKeys)){inspectLinkedKeys=inspectLinkedKeys.map(_remap).filter(k=>k);}if(typeof sourceRefBox!=='undefined'&&sourceRefBox&&sourceRefBox.sourceKey){const r=_remap(sourceRefBox.sourceKey);if(r!=='')sourceRefBox.sourceKey=r;}cleanupTTLinks();cleanupHowLinks();return;}const oldB={};Object.keys(B).filter(k=>k.startsWith(spId+'-')).forEach(k=>{oldB[k]=B[k];delete B[k];});sp.cols.forEach((col,ci)=>{col.boxes.forEach((label,bi)=>{const k=`${spId}-c${ci}-b${bi}`;const old=oldB[k];B[k]=old||{label,light:'grey',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[]};B[k].label=label;});});cleanupTTLinks();cleanupHowLinks();}
function rebuildFinalKeys(){const oldB={};Object.keys(B).filter(k=>k.startsWith('final-')).forEach(k=>{oldB[k]=B[k];delete B[k];});FO_DATA.forEach((label,i)=>{const k=`final-b${i}`;const old=oldB[k];B[k]=old||{label,light:'grey',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',measures:[],evalQuestions:[],tagIds:[]};B[k].label=label;});}

/* V1.0.13.2 (Fix 1): detect explicit blank/starter This\u2013Then page requests in the user's chat message. Returns true when the user clearly asks for a blank/starter/empty/shell page rather than a populated one. Used to bypass the populated-page validation so genuinely-blank requests still create a blank/starter page. */
function isBlankPageRequest(msg){if(!msg)return false;return /\b(blank|starter|empty|shell|skeleton)\b/i.test(msg);}

/* V1.0.13.2 (Fix 1): detect populated This\u2013Then page requests in the user's chat message. Returns true when the user is asking for a populated/filled-in This\u2013Then page about a topic. The trigger phrasings cover the common cases: "populate it", "add DoView this-then boxes", "create a this-then logic for X", "add a this-then page", and "add a page and fill it in". V1.0.14.0 (Fix 3) extends this to include "full DoView", "complete DoView", "full logic", and "full populated page" so phrasings such as "add a new page called X which includes a full DoView on it" reliably propose a populated This\u2013Then page. V1.0.14.0 also REMOVES the previous broad "add a page about X" matcher (without an explicit this-then keyword or populated trigger) so a bare "add a page about X" is now classified as ambiguous (see isAmbiguousPageCreationRequest) and asks for the page type instead. V1.0.14.1b (Fix 7) extends phrase coverage further so common informal phrasings reliably propose a populated This\u2013Then page when the intent is clear: "do/make the full map (for X)", "map this out", "build out (a/this) page", "fill out this page", "build the full logic", and "turn this into a full page". Tight phrasings only \u2014 the broad word "map" by itself, or "section" by itself, do NOT trigger; question-only requests are NOT triggered. An explicit blank/starter request short-circuits to false so a clearly-blank request bypasses populated-page validation. Used by processAIResponse to validate that the AI's proposed structural actions actually populate the new page rather than leaving it as a one-box placeholder. */
function isPopulatedThisThenPageRequest(msg){if(!msg)return false;if(isBlankPageRequest(msg))return false;if(/\bpopulate\b/i.test(msg))return true;if(/\bfill\s+(it|in|out|the\s+page|out\s+this\s+page)\b/i.test(msg))return true;/* V1.0.14.0 (Fix 3): "full DoView" / "complete DoView" / "full logic" / "full populated page" all trigger populated This\u2013Then page behavior. */if(/\b(full|complete)\s+doview\b/i.test(msg))return true;if(/\bfull\s+(logic|populated\s+page|populated)\b/i.test(msg))return true;/* V1.0.14.1b (Fix 7): "build the full logic" (a non-noun-form alternative to "full logic") also triggers populated. */if(/\bbuild\s+(the\s+|a\s+)?full\s+logic\b/i.test(msg))return true;/* V1.0.14.1b (Fix 7): "do the full map" / "make the full map" / "the full map for X" trigger populated. The bare word "map" by itself does NOT trigger \u2014 it must be preceded by "do/make/build the full" or be the verb in "map this out". */if(/\b(do|make|build)\s+(the\s+|a\s+)?full\s+map\b/i.test(msg))return true;if(/\bmap\s+(this|it|that)\s+out\b/i.test(msg))return true;/* V1.0.14.1b (Fix 7): "build out (a/this/the) page", "fill out this page", "turn this into a full page" trigger populated. These phrasings are about populating a page, not just creating a shell. */if(/\bbuild\s+out\s+(a\s+|an\s+|the\s+|this\s+)?page\b/i.test(msg))return true;if(/\bturn\s+(this|it|that)\s+into\s+(a\s+)?full\s+page\b/i.test(msg))return true;if(/\b(add|create|make)\s+(a\s+|an\s+)?(new\s+)?this[-\u2013\s]*then\s+page\b/i.test(msg))return true;if(/\bcreate\s+(a\s+|an\s+)?this[-\u2013\s]*then\s+(logic|page|flow)\b/i.test(msg))return true;if(/\badd\s+(doview\s+)?(this[-\u2013\s]*then\s+)?boxes\b/i.test(msg))return true;if(/\badd\s+(a\s+|an\s+)?(new\s+)?page\b.*\bfill\b/i.test(msg))return true;return false;}

/* V1.0.14.0 (Fix 1, Fix 2): detect generic page-creation phrasings in the user's chat message. Returns true when the user is asking to add/create/make a page (or "add X as a page"). Used together with isExplicitPageType, isBlankPageRequest, and isPopulatedThisThenPageRequest to decide whether a page-creation request is ambiguous and needs the page-type clarification question. Deliberately tight so it does not misfire on rename/delete/edit ("rename this page", "delete this page") or board-level commentary. V1.0.14.1b (Fix 7) also detects "make/add another tab", "set up a section (for X)", "build out (a/this/the) page", and "turn this into a full page" so common informal page-creation phrasings are recognised. Tight phrasings only \u2014 the bare word "section" or "tab" or "map" does NOT trigger; questions like "what does this map say about X" do NOT trigger. */
function isPageCreationRequest(msg){if(!msg)return false;if(/\b(add|create|make)\s+(a\s+|an\s+)([a-z\u2013-]+\s+){0,3}page\b/i.test(msg))return true;if(/\b(add|create|make)\s+(a\s+|an\s+)?new\s+([a-z\u2013-]+\s+){0,3}page\b/i.test(msg))return true;if(/\bnew\s+(this[-\u2013\s]*then|how|documentation|doc)\s+page\b/i.test(msg))return true;if(/\bas\s+a\s+(new\s+)?(this[-\u2013\s]*then|how|documentation|doc)?\s*page\b/i.test(msg))return true;/* V1.0.14.1b (Fix 7): "make another tab", "add another tab", "make a new tab" \u2014 page-creation by another name. */if(/\b(make|add|create)\s+(another|a\s+new|a)\s+tab\b/i.test(msg))return true;/* V1.0.14.1b (Fix 7): "set up a section (for X)" \u2014 ambiguous page-creation. The bare word "section" without "set up a" does NOT trigger. */if(/\bset\s+up\s+(a\s+|an\s+)?(new\s+)?section\b/i.test(msg))return true;/* V1.0.14.1b (Fix 7): "build out a/this/the page", "turn this into a full page" \u2014 also page-creation phrasings (these typically mean populated, but isPopulatedThisThenPageRequest will catch the populated intent and bypass the ambiguity check). */if(/\bbuild\s+out\s+(a\s+|an\s+|the\s+|this\s+)?page\b/i.test(msg))return true;if(/\bturn\s+(this|it|that)\s+into\s+(a\s+)?(full\s+)?page\b/i.test(msg))return true;return false;}

/* V1.0.14.0 (Fix 2): detect whether the user has explicitly stated which page type they want (This\u2013Then, How, or Documentation). Used by isAmbiguousPageCreationRequest. Includes common variants like "doc page", "this-then page", "this then page", "how page". */
function isExplicitPageType(msg){if(!msg)return false;if(/\bthis[-\u2013\s]*then\s+page\b/i.test(msg))return true;if(/\bhow\s+page\b/i.test(msg))return true;if(/\b(documentation|doc)\s+page\b/i.test(msg))return true;return false;}

/* V1.0.14.0 (Fix 2): detect ambiguous page-creation requests where the user has asked to add/create/make a page but has NOT specified which page type they want and has NOT clearly implied a populated This\u2013Then page (via "full DoView", "populate it", etc.). Examples that should be classified as ambiguous: "add a page called leadership development", "create a new page about leadership development", "make a page for leadership development", "add leadership development as a page". Examples that are NOT ambiguous: "add a How page called X" (explicit type), "add a blank This\u2013Then page" (explicit type with blank qualifier), "add a complete DoView page about X" (populated trigger), "add a full populated page about X" (populated trigger). Note: a blank request without an explicit page type ("add a starter page called X") is still ambiguous because the page type is missing \u2014 the AI must ask which type before creating. Used by processAIResponse to reject any addSubpage emitted for an ambiguous request before queuing pendingStructural so no page is silently created. */
function isAmbiguousPageCreationRequest(msg){if(!msg)return false;if(!isPageCreationRequest(msg))return false;if(isExplicitPageType(msg))return false;if(isPopulatedThisThenPageRequest(msg))return false;return true;}

/* V1.0.13.2 (Fix 1): pick the page type from an addSubpage action array. Mirrors the parsing in execAction's addSubpage branch so validation and summary stay consistent with apply behavior. Defaults to this_then. */
function _pageTypeFromAddSubpage(a){if(!a||a[0]!=='addSubpage')return 'this_then';if(a.length>=3 && a[2] && a[2].charAt(0)!=='#' && ['this_then','how','documentation'].indexOf(a[2])>=0)return a[2];return 'this_then';}

/* V1.0.13.2 (Fix 1): walk the structural actions array and predict the new page id assigned by execAction's addSubpage branch (id = 'p'+(SP.length+1) at the time addSubpage runs). Returns an array of {action, predictedId, pageType} entries, one per addSubpage in order. */
function _predictNewPageIds(structActions){var out=[];var nextN=SP.length+1;structActions.forEach(function(a){if(a[0]==='addSubpage'){var pType=_pageTypeFromAddSubpage(a);out.push({action:a,predictedId:'p'+nextN,pageType:pType});nextN++;}});return out;}

/* V1.0.14.1b (Fix 5, Fix 9, Fix 10, Fix 11, Fix 12): preflight validation for an entire action set before anything is applied. Performs a dry-run over a working "shadow" model that mirrors the parts of execAction's behavior that affect target resolution: addSubpage adds a new page with the next predicted id (and a default first column "First Stage" for this_then / documentation, no columns for how pages); addColumn / removeColumn / moveColumn updates the working column list; addBox / removeBox updates the working box list (and renumbers indices because rebuildBoxKeys does the same on apply); addFinalOutcome / removeFinalOutcome updates the working FO list; createMeasure / createEQ / deleteMeasure / deleteEQ updates the working measure / EQ id list; addTTLink / addHowLink / removeTTLink / removeHowLink updates working link id maps. The validator does NOT execute real actions; it only checks that every action references a valid object (existing in the current state OR created earlier in the same set), that page types are supported (this_then, how, documentation), that column indices are valid for the resolved page, that new labels/headings are non-empty, that addBox actions have valid page+column targets, that the action's parts.length meets CMD_MIN_PARTS for that command, and that the command name appears in SUPPORTED_CMDS. Returns {ok:true} or {ok:false, message:'...'}. The message is plain-language; never a stack trace or raw internal error. */
function _validateActionSet(actions){
  if(!Array.isArray(actions)||!actions.length)return {ok:true};
  // Working shadow state. We model only the parts of execAction that affect target resolution.
  var W={
    pages:{},  // pid -> {pageType, cols:[{h, boxes:[label,...]}], howIds:[h001,...], finalRm:false}
    pageOrder:[],  // pids in order
    nextNewN:SP.length+1,
    fo:FO_DATA.slice(),  // list of labels (positions used as bI)
    measures:measures.map(function(m){return m.id;}),
    eqs:evalQuestions.map(function(q){return q.id;}),
    ttLinkIds:ttLinks.map(function(l){return l.id;}),
    howLinkIds:howLinks.map(function(l){return l.id;})
  };
  // Seed W.pages from current SP
  SP.forEach(function(sp){
    var entry={pageType:sp.pageType||'this_then',cols:[],howIds:[]};
    if(entry.pageType==='how'){if(sp.howBoxes)entry.howIds=sp.howBoxes.map(function(h){return h.id;});}
    else{(sp.cols||[]).forEach(function(col){entry.cols.push({h:col.h,boxes:(col.boxes||[]).slice()});});}
    W.pages[sp.id]=entry;W.pageOrder.push(sp.id);
  });
  function pageExists(pid){return !!W.pages[pid];}
  function resolveBoxKey(k){
    if(!k)return null;
    var m=k.match(/^(p\d+)-c(\d+)-b(\d+)$/);
    if(m){var pid=m[1],ci=parseInt(m[2]),bi=parseInt(m[3]);var pg=W.pages[pid];if(!pg||pg.pageType==='how')return null;if(!pg.cols[ci])return null;if(pg.cols[ci].boxes[bi]===undefined)return null;return {kind:'tt',pid:pid,ci:ci,bi:bi};}
    var hm=k.match(/^(p\d+)-(H\d{3,})$/);
    if(hm){var pid2=hm[1],hid=hm[2];var pg2=W.pages[pid2];if(!pg2||pg2.pageType!=='how')return null;if(pg2.howIds.indexOf(hid)<0)return null;return {kind:'how',pid:pid2,hid:hid};}
    var fm=k.match(/^final-b(\d+)$/);
    if(fm){var i=parseInt(fm[1]);if(i<0||i>=W.fo.length)return null;return {kind:'final',fi:i};}
    return null;
  }
  for(var idx=0;idx<actions.length;idx++){
    var a=actions[idx];if(!Array.isArray(a)||!a.length)return {ok:false,message:'I could not apply that change because the action format was incomplete or malformed. No changes were made.'};
    var cmd=a[0];
    if(SUPPORTED_CMDS.indexOf(cmd)<0)return {ok:false,message:'Unsupported action: "'+cmd+'". I could not apply that change. No changes were made.'};
    var minP=CMD_MIN_PARTS[cmd];
    if(typeof minP==='number' && a.length<minP)return {ok:false,message:'I could not apply that change because the action format was incomplete or malformed. No changes were made.'};
    // Per-command target validation + working-state update
    if(cmd==='setLight'||cmd==='addSofar'||cmd==='addNote'||cmd==='addNote1'||cmd==='addNote2'||cmd==='addNote3'||cmd==='setPriority'||cmd==='clearEntries'||cmd==='setDetail'||cmd==='clearDetail'||cmd==='setBoxBorder'||cmd==='clearBoxBorder'){
      if(!resolveBoxKey(a[1]))return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
    }
    else if(cmd==='setSubpageLights'||cmd==='setSubpageBorders'||cmd==='clearSubpageBorders'){
      if(!pageExists(a[1]))return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
    }
    else if(cmd==='setPageInfo'){
      var pid=a[1];if(pid!=='overview'&&pid!=='final'&&!pageExists(pid))return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
    }
    else if(cmd==='addBox'){
      var spId=a[1],ci=parseInt(a[2]),lbl=a.slice(3).join(':');
      var pg=W.pages[spId];if(!pg)return {ok:false,message:'I could not add that box because the target page could not be found. No changes were made.'};
      if(pg.pageType==='how')return {ok:false,message:'I could not add that box because How pages do not use addBox. No changes were made.'};
      if(isNaN(ci)||ci<0||!pg.cols[ci])return {ok:false,message:'I could not add that box because the target column could not be found. No changes were made.'};
      if(!lbl||!lbl.trim())return {ok:false,message:'I could not add that box because the box label was empty. No changes were made.'};
      pg.cols[ci].boxes.push(lbl);
    }
    else if(cmd==='removeBox'){
      var rb=resolveBoxKey(a[1]);if(!rb||rb.kind!=='tt')return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
      W.pages[rb.pid].cols[rb.ci].boxes.splice(rb.bi,1);
    }
    else if(cmd==='renameBox'){
      var rn=resolveBoxKey(a[1]);if(!rn)return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
      var nlbl=a.slice(2).join(':');if(!nlbl||!nlbl.trim())return {ok:false,message:'I could not apply that change because the new label was empty. No changes were made.'};
      if(rn.kind==='tt')W.pages[rn.pid].cols[rn.ci].boxes[rn.bi]=nlbl;
      else if(rn.kind==='final')W.fo[rn.fi]=nlbl;
    }
    else if(cmd==='addColumn'){
      var spIdC=a[1],ciC=parseInt(a[2]),hC=a.slice(3).join(':');
      var pgC=W.pages[spIdC];if(!pgC)return {ok:false,message:'I could not add that column because the target page could not be found. No changes were made.'};
      if(pgC.pageType==='how')return {ok:false,message:'I could not add that column because How pages do not use columns. No changes were made.'};
      if(isNaN(ciC)||ciC<0||ciC>pgC.cols.length)return {ok:false,message:'I could not add that column because the target column index is out of range. No changes were made.'};
      if(!hC||!hC.trim())return {ok:false,message:'I could not add that column because the heading was empty. No changes were made.'};
      pgC.cols.splice(ciC,0,{h:hC,boxes:[]});
    }
    else if(cmd==='removeColumn'){
      var spIdRc=a[1],ciRc=parseInt(a[2]);var pgRc=W.pages[spIdRc];if(!pgRc)return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
      if(pgRc.pageType==='how')return {ok:false,message:'I could not apply that change because How pages do not use columns. No changes were made.'};
      if(isNaN(ciRc)||!pgRc.cols[ciRc])return {ok:false,message:'I could not apply that change because the target column could not be found. No changes were made.'};
      pgRc.cols.splice(ciRc,1);
    }
    else if(cmd==='renameColumn'){
      var spIdRn=a[1],ciRn=parseInt(a[2]),nhRn=a.slice(3).join(':');var pgRn=W.pages[spIdRn];if(!pgRn)return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
      if(pgRn.pageType==='how')return {ok:false,message:'I could not apply that change because How pages do not use columns. No changes were made.'};
      if(isNaN(ciRn)||!pgRn.cols[ciRn])return {ok:false,message:'I could not apply that change because the target column could not be found. No changes were made.'};
      if(!nhRn||!nhRn.trim())return {ok:false,message:'I could not apply that change because the new heading was empty. No changes were made.'};
      pgRn.cols[ciRn].h=nhRn;
    }
    else if(cmd==='moveColumn'){
      var spIdMc=a[1],fr=parseInt(a[2]),to=parseInt(a[3]);var pgMc=W.pages[spIdMc];if(!pgMc)return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
      if(pgMc.pageType==='how')return {ok:false,message:'I could not apply that change because How pages do not use columns. No changes were made.'};
      if(isNaN(fr)||isNaN(to)||!pgMc.cols[fr]||to<0||to>=pgMc.cols.length)return {ok:false,message:'I could not apply that change because the target column could not be found. No changes were made.'};
      var col=pgMc.cols.splice(fr,1)[0];pgMc.cols.splice(to,0,col);
    }
    else if(cmd==='addSubpage'){
      var lblS=a[1];if(!lblS||!lblS.trim())return {ok:false,message:'I could not add that page because the page title was empty. No changes were made.'};
      var pType='this_then';if(a.length>=3 && a[2] && a[2].charAt(0)!=='#'){if(['this_then','how','documentation'].indexOf(a[2])<0)return {ok:false,message:'I could not add that page because the page type "'+a[2]+'" is not supported. No changes were made.'};pType=a[2];}
      var newId='p'+W.nextNewN;W.nextNewN++;var entryS={pageType:pType,cols:[],howIds:[]};
      if(pType==='how'){for(var hi=1;hi<=8;hi++){entryS.howIds.push('H'+String(hi).padStart(3,'0'));}}
      else{entryS.cols.push({h:'First Stage',boxes:[]});}
      W.pages[newId]=entryS;W.pageOrder.push(newId);
    }
    else if(cmd==='removeSubpage'){
      var rmId=a[1];if(!pageExists(rmId))return {ok:false,message:'I could not apply that change because the target page could not be found. No changes were made.'};
      delete W.pages[rmId];var oi=W.pageOrder.indexOf(rmId);if(oi>=0)W.pageOrder.splice(oi,1);
    }
    else if(cmd==='addFinalOutcome'){
      var fl=a.slice(1).join(':');if(!fl||!fl.trim())return {ok:false,message:'I could not add that final outcome because the label was empty. No changes were made.'};
      W.fo.push(fl);
    }
    else if(cmd==='removeFinalOutcome'){
      var fi=parseInt(a[1]);if(isNaN(fi)||fi<0||fi>=W.fo.length)return {ok:false,message:'I could not apply that change because the target final outcome could not be found. No changes were made.'};
      W.fo.splice(fi,1);
    }
    else if(cmd==='addTTLink'){
      var fk=resolveBoxKey(a[1]);var tk=resolveBoxKey(a[2]);if(!fk||!tk||fk.kind!=='tt'||tk.kind!=='tt')return {ok:false,message:'I could not add that link because one of the linked boxes could not be found. No changes were made.'};
    }
    else if(cmd==='removeTTLink'||cmd==='flipTTLink'){
      if(W.ttLinkIds.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target structural link could not be found. No changes were made.'};
      if(cmd==='removeTTLink'){var li=W.ttLinkIds.indexOf(a[1]);W.ttLinkIds.splice(li,1);}
    }
    else if(cmd==='addHowLink'){
      var hfk=resolveBoxKey(a[1]);var htk=resolveBoxKey(a[2]);if(!hfk||!htk)return {ok:false,message:'I could not add that link because one of the linked boxes could not be found. No changes were made.'};
    }
    else if(cmd==='removeHowLink'){
      if(W.howLinkIds.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target structural link could not be found. No changes were made.'};
      var hli=W.howLinkIds.indexOf(a[1]);W.howLinkIds.splice(hli,1);
    }
    else if(cmd==='createMeasure'){
      var mt=a.slice(1).join(':');if(!mt||!mt.trim())return {ok:false,message:'I could not create that Measure because the title was empty. No changes were made.'};
      W.measures.push('M'+String(W.measures.length+1).padStart(3,'0'));
    }
    else if(cmd==='createEQ'){
      var qt=a.slice(1).join(':');if(!qt||!qt.trim())return {ok:false,message:'I could not create that Evaluation Question because the question text was empty. No changes were made.'};
      W.eqs.push('EQ'+String(W.eqs.length+1).padStart(3,'0'));
    }
    else if(cmd==='linkMeasure'||cmd==='unlinkMeasure'){
      if(W.measures.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Measure could not be found. No changes were made.'};
      if(!resolveBoxKey(a[2]))return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
    }
    else if(cmd==='linkEQ'||cmd==='unlinkEQ'){
      if(W.eqs.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Evaluation Question could not be found. No changes were made.'};
      if(!resolveBoxKey(a[2]))return {ok:false,message:'I could not apply that change because the target box could not be found. No changes were made.'};
    }
    else if(cmd==='deleteMeasure'){
      if(W.measures.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Measure could not be found. No changes were made.'};
      var dmi=W.measures.indexOf(a[1]);W.measures.splice(dmi,1);
    }
    else if(cmd==='deleteEQ'){
      if(W.eqs.indexOf(a[1])<0)return {ok:false,message:'I could not apply that change because the target Evaluation Question could not be found. No changes were made.'};
      var deqi=W.eqs.indexOf(a[1]);W.eqs.splice(deqi,1);
    }
    // Other state-only commands (setAllLights, setBoardInfo) require no target validation beyond the parts.length check.
  }
  return {ok:true};
}

/* V1.0.13.2 (Fix 1) / V1.0.14.0 (Fix 6) / V1.0.14.1b (Fix 8): validate populated This\u2013Then page proposals. Given the structural actions array, count addColumn / removeColumn / addBox actions targeting each predicted new this_then page id, and report any predicted page where the resulting structure would be a one-box placeholder or sparse: fewer than 3 columns total or fewer than 6 boxes. Engine adds 1 default column ("First Stage") when an addSubpage:this_then runs, so total columns = 1 + addColumn(this id) - removeColumn(this id). Total boxes = addBox(this id). V1.0.14.0 (Fix 6) also flags pages whose column headings are mechanical numbered placeholders such as "Stage 1", "Stage 2", "Column 1", "Step 2", "Phase 3" \u2014 these are rejected because the build requires column headings that name real causal stages. V1.0.14.1b (Fix 8) also flags pages whose column headings are dominated by the generic logic-model template Inputs / Activities / Outputs (specifically: 2 or more of those generic words used as headings together) so a mechanical "Inputs / Activities / Outputs" page is rejected unless the AI uses a domain-specific shape; single occurrences of those words are still allowed because a domain may genuinely have one stage called "Outputs". The default first-column heading "First Stage" is left alone (this is the engine's default until the AI renames it via renameColumn) \u2014 the AI is expected to renameColumn it to a domain-specific heading; if it does not rename it, the count of generic headings still flags the proposal. Returns array of insufficient predicted page descriptors with totalCols, addBoxes, hasGenericHeadings, and a human-readable reason string. */
function _findInsufficientThisThenPageProposals(structActions){var preds=_predictNewPageIds(structActions);var bad=[];var genericRx=/^(stage|column|step|phase)\s*\d+$/i;var genericTemplateRx=/^(inputs?|activities|outputs?)$/i;preds.forEach(function(p){if(p.pageType!=='this_then')return;var pid=p.predictedId;var addCols=structActions.filter(function(a){return a[0]==='addColumn' && a[1]===pid;}).length;var rmCols=structActions.filter(function(a){return a[0]==='removeColumn' && a[1]===pid;}).length;var totalCols=1+addCols-rmCols;var addBoxes=structActions.filter(function(a){return a[0]==='addBox' && a[1]===pid;}).length;/* V1.0.14.0 (Fix 6): scan addColumn / renameColumn headings for mechanical numbered placeholders. If any heading targeting this page id matches the generic pattern, flag the proposal. V1.0.14.1b (Fix 8): also count Inputs/Activities/Outputs headings; flag when 2 or more occur together. */var hasGenericHeadings=false;var templateCount=0;for(var k=0;k<structActions.length;k++){var a2=structActions[k];if((a2[0]==='renameColumn' || a2[0]==='addColumn') && a2[1]===pid){var heading=(a2.slice(3).join(':')||'').trim();if(genericRx.test(heading)){hasGenericHeadings=true;}if(genericTemplateRx.test(heading)){templateCount++;}}}var hasGenericTemplate=templateCount>=2;var reason=[];if(totalCols<3)reason.push('only '+totalCols+' column'+(totalCols===1?'':'s'));if(addBoxes<6)reason.push('only '+addBoxes+' box'+(addBoxes===1?'':'es'));if(hasGenericHeadings)reason.push('mechanical numbered column headings');if(hasGenericTemplate)reason.push('generic Inputs / Activities / Outputs template headings');if(reason.length){bad.push({predictedId:pid,label:p.action[1]||'(untitled)',totalCols:totalCols,addBoxes:addBoxes,hasGenericHeadings:hasGenericHeadings,hasGenericTemplate:hasGenericTemplate,reason:reason.join(', ')});}});return bad;}

function processAIResponse(fullText,userMsg){const{clean,actions}=parseActions(fullText);if(!actions.length)return clean;
  /* V1.0.14.1b (Fix 5, Fix 11, Fix 12): preflight validation runs first \u2014 before snapshot, before any state-action execution, before showing OK/Cancel. If any action is malformed, has an unsupported command name, or targets a missing object, the WHOLE action set is rejected with a plain-language message and nothing is applied. */
  var v=_validateActionSet(actions);
  if(!v.ok){addChatMsg('system',v.message);return clean;}
  const stateActions=actions.filter(a=>!STRUCTURAL_CMDS.includes(a[0]));const structActions=actions.filter(a=>STRUCTURAL_CMDS.includes(a[0]));
  /* V1.0.14.0 (Fix 2, Fix 6): if the user's request is an ambiguous page-creation request (no page type specified, no populated trigger), reject any addSubpage actions emitted by the AI. The AI is expected by the prompt to ask the page-type clarification question instead of emitting addSubpage; this engine-side guard is a safety net so a page is never silently created with the wrong type. Other action shapes (state changes, removals, renames, link/measure/EQ actions, etc.) are unaffected by this guard. */
  if(structActions.length && userMsg && isAmbiguousPageCreationRequest(userMsg)){var hasAddSubpage=structActions.some(function(a){return a[0]==='addSubpage';});if(hasAddSubpage){addChatMsg('system','Your request did not specify the page type (This\u2013Then page, How page, or Documentation page). The change has not been applied. Please clarify which type of page you want \u2014 see the question above \u2014 and the board chat will then propose the right page.');return clean;}}
  /* V1.0.13.2 (Fix 1) / V1.0.14.0 (Fix 6) / V1.0.14.1b (Fix 8): if the user clearly asked for a populated This\u2013Then page (and did not explicitly ask for a blank/starter page), validate that the AI's proposed structural actions would actually create a properly populated page. Reject sparse proposals (fewer than 3 columns or fewer than 6 boxes) or proposals with mechanical numbered column headings or generic Inputs/Activities/Outputs template headings. The change is rejected before queuing pendingStructural so a one-box placeholder or generic-template page is never silently applied. Other action shapes (How pages, Documentation pages, removals, renames, link/measure/EQ actions, etc.) are unaffected. */
  if(structActions.length && userMsg && isPopulatedThisThenPageRequest(userMsg)){var insufficient=_findInsufficientThisThenPageProposals(structActions);if(insufficient.length){var listing=insufficient.map(function(x){return '"'+x.label+'" ('+x.reason+')';}).join('; ');addChatMsg('system','It looks like you asked for a populated This\u2013Then page, but the proposed change would not create a properly populated page: '+listing+'. A populated This\u2013Then page should have at least 3 columns and at least 6 boxes, and the column headings must name real causal stages for the domain (not "Stage 1, Stage 2, Stage 3" or a generic "Inputs / Activities / Outputs" template). The change has not been applied. Please ask again with more domain-specific detail, or say "add a blank/starter page about X" if you really want a shell.');return clean;}}
  /* V1.0.14.1b (Fix 6): mixed-transaction handling. State-only responses still apply directly with a snapshot (preserving the existing safe direct-apply path). Structural-only responses still queue pendingStructural and show OK/Cancel. Mixed responses queue BOTH state and structural actions and present them together in one OK/Cancel preview, so the user sees the full change set and Cancel rolls back to a clean state without partial application. */
  if(structActions.length && stateActions.length){
    takeSnapshot();
    pendingStateActions=stateActions;
    pendingStructural=structActions;
    showConfirmation({state:stateActions,structural:structActions});
    return clean;
  }
  if(stateActions.length||structActions.length)takeSnapshot();
  stateActions.forEach(a=>execAction(a));
  if(structActions.length){pendingStructural=structActions;showConfirmation(structActions);}
  return clean;
}

/* V1.0.13.2 (Fix 1): showConfirmation now accepts either a string description (legacy) or the structural-actions array. When given the actions array it renders a clean structured summary that groups addSubpage + addColumn / renameColumn / addBox actions by predicted new page id, and shows the page title, the column headings, and the actual box count for each new page. Other structural actions render as one line each. The summary makes it clear what will be added before the user clicks OK. The pendingStructural array (carrying the FULL set of proposed columns and boxes) is unchanged and is still applied in order by confirmStructural on OK. V1.0.14.1b (Fix 6): showConfirmation now also accepts a mixed object {state:[...],structural:[...]} so a chat response containing both state and structural actions can be presented in ONE OK/Cancel preview that covers both kinds. */
function showConfirmation(descOrActions){var msgs=document.getElementById('chatMsgs');var div=document.createElement('div');div.className='chat-m sys';var summaryHTML;if(descOrActions && !Array.isArray(descOrActions) && typeof descOrActions==='object' && (descOrActions.state||descOrActions.structural)){summaryHTML=_buildStructuralChangeSummaryHTML(descOrActions.structural||[],descOrActions.state||[]);}else if(Array.isArray(descOrActions)){summaryHTML=_buildStructuralChangeSummaryHTML(descOrActions);}else{summaryHTML='<div style="margin:4px 0">'+escHtml(String(descOrActions))+'</div>';}div.innerHTML='\u26a0\ufe0f Change(s) proposed:'+summaryHTML+'<button onclick="confirmStructural(true)" style="background:#22c55e;color:#fff;border:none;border-radius:5px;padding:4px 12px;margin:5px 4px 0 0;cursor:pointer;font-size:11px;font-weight:600">OK</button><button onclick="confirmStructural(false)" style="background:#ef4444;color:#fff;border:none;border-radius:5px;padding:4px 12px;margin:5px 0 0;cursor:pointer;font-size:11px;font-weight:600">Cancel</button>';msgs.appendChild(div);msgs.scrollTop=msgs.scrollHeight;}

/* V1.0.13.2 (Fix 1) / V1.0.14.0 (Fix 5): build the structured summary HTML for the confirmation message. addSubpage actions are grouped with their related addColumn / renameColumn / addBox actions (by predicted new page id) into a single readable line per new page that shows the page type, title, column headings and box count. V1.0.14.0 (Fix 5) adds a small Populated / Blank-starter status pill for This\u2013Then page proposals so the OK / Cancel preview makes obvious whether a full page is being proposed or only a shell. Unrelated structural actions (removals, renames, etc.) render as one bullet line each, escaped. */
function _buildStructuralChangeSummaryHTML(actions,stateActionsForPreview){
  /* V1.0.14.1b (Fix 4): per-action friendly preview lines for individual structural and state actions. addSubpage groupings (with addColumn / renameColumn / addBox children) are still rendered as the existing rich grouped line. Other actions \u2014 especially destructive ones \u2014 now render with plain-language wording that names the affected object (page, column, box, final outcome, Measure, EQ, link, association) so the user understands what will happen before clicking OK. Targets are resolved from current state SP / B / FO_DATA / measures / evalQuestions / ttLinks / howLinks; resolution failures fall back to a compact tag-only line. By the time we reach this function, _validateActionSet has already run and rejected unresolvable targets, so resolution should normally succeed.
     V1.0.14.1b (Fix 6): stateActionsForPreview, if provided, lists state-action lines (setLight, setPriority, addSofar, etc.) below the structural lines so a mixed transaction shows ALL changes in ONE preview. State-only responses still apply directly (this function is not used for them). */
  function _safe(s){return escHtml(String(s==null?'':s));}
  function _pageLabelById(pid){var sp=SP.find(function(s){return s.id===pid;});return sp?sp.label:pid;}
  function _resolveTTBoxLabel(k){var b=B[k];if(b)return b.label;var m=k&&k.match(/^(p\d+)-c(\d+)-b(\d+)$/);if(m){var sp=SP.find(function(s){return s.id===m[1];});if(sp&&sp.cols[parseInt(m[2])]&&sp.cols[parseInt(m[2])].boxes[parseInt(m[3])]!==undefined)return sp.cols[parseInt(m[2])].boxes[parseInt(m[3])];}return k;}
  function _resolveColumnHeading(spId,ci){var sp=SP.find(function(s){return s.id===spId;});if(sp&&sp.cols[ci])return sp.cols[ci].h;return 'column '+(ci+1);}
  function _resolveAnyBoxLabel(k){if(!k)return k;if(k.indexOf('final-b')===0){var i=parseInt(k.replace('final-b',''));if(!isNaN(i)&&i>=0&&i<FO_DATA.length)return FO_DATA[i];}var b=B[k];if(b)return b.label;return _resolveTTBoxLabel(k);}
  function _resolveMeasureTitle(mid){var m=measures.find(function(x){return x.id===mid;});return m?m.title:mid;}
  function _resolveEQText(eid){var q=evalQuestions.find(function(x){return x.id===eid;});return q?q.questionText:eid;}
  function _resolveTTLinkPair(lid){var l=ttLinks.find(function(x){return x.id===lid;});if(!l)return null;return {from:_resolveAnyBoxLabel(l.from),to:_resolveAnyBoxLabel(l.to)};}
  function _resolveHowLinkPair(lid){var l=howLinks.find(function(x){return x.id===lid;});if(!l)return null;return {from:_resolveAnyBoxLabel(l.from),to:_resolveAnyBoxLabel(l.to)};}
  function _renderSingleAction(a){
    var cmd=a[0];
    if(cmd==='removeBox'){var rb=B[a[1]];var bm=a[1]&&a[1].match(/^(p\d+)-c(\d+)-b(\d+)$/);var pl=bm?_pageLabelById(bm[1]):'';return 'Remove box "'+_safe(_resolveAnyBoxLabel(a[1]))+'"'+(pl?' from page "'+_safe(pl)+'"':'')+'.';}
    if(cmd==='renameBox'){return 'Rename box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to "'+_safe(a.slice(2).join(':'))+'".';}
    if(cmd==='addBox'){var pl2=_pageLabelById(a[1]);var ci2=parseInt(a[2]);var ch=_resolveColumnHeading(a[1],ci2);return 'Add new box "'+_safe(a.slice(3).join(':'))+'" to column "'+_safe(ch)+'" on page "'+_safe(pl2)+'".';}
    if(cmd==='removeColumn'){var pl3=_pageLabelById(a[1]);var ch3=_resolveColumnHeading(a[1],parseInt(a[2]));return 'Remove column "'+_safe(ch3)+'" from page "'+_safe(pl3)+'".';}
    if(cmd==='renameColumn'){var pl4=_pageLabelById(a[1]);var ch4=_resolveColumnHeading(a[1],parseInt(a[2]));return 'Rename column "'+_safe(ch4)+'" on page "'+_safe(pl4)+'" to "'+_safe(a.slice(3).join(':'))+'".';}
    if(cmd==='addColumn'){var pl5=_pageLabelById(a[1]);return 'Add new column "'+_safe(a.slice(3).join(':'))+'" to page "'+_safe(pl5)+'".';}
    if(cmd==='moveColumn'){var pl6=_pageLabelById(a[1]);var ch6=_resolveColumnHeading(a[1],parseInt(a[2]));return 'Move column "'+_safe(ch6)+'" on page "'+_safe(pl6)+'" to position '+( (parseInt(a[3])||0)+1)+'.';}
    if(cmd==='removeSubpage'){return 'Remove page "'+_safe(_pageLabelById(a[1]))+'".';}
    if(cmd==='addFinalOutcome'){return 'Add new final outcome "'+_safe(a.slice(1).join(':'))+'".';}
    if(cmd==='removeFinalOutcome'){var fi=parseInt(a[1]);var fl=(fi>=0&&fi<FO_DATA.length)?FO_DATA[fi]:('#'+fi);return 'Remove final outcome "'+_safe(fl)+'".';}
    if(cmd==='deleteMeasure'){return 'Delete Measure "'+_safe(_resolveMeasureTitle(a[1]))+'" (and remove all its associations).';}
    if(cmd==='deleteEQ'){return 'Delete Evaluation Question "'+_safe(_resolveEQText(a[1]))+'" (and remove all its associations).';}
    if(cmd==='removeTTLink'){var pr=_resolveTTLinkPair(a[1]);if(pr)return 'Remove structural link from "'+_safe(pr.from)+'" to "'+_safe(pr.to)+'".';return 'Remove structural link '+_safe(a[1])+'.';}
    if(cmd==='removeHowLink'){var hpr=_resolveHowLinkPair(a[1]);if(hpr)return 'Remove How link from "'+_safe(hpr.from)+'" to "'+_safe(hpr.to)+'".';return 'Remove How link '+_safe(a[1])+'.';}
    if(cmd==='flipTTLink'){var fpr=_resolveTTLinkPair(a[1]);if(fpr)return 'Reverse structural link between "'+_safe(fpr.from)+'" and "'+_safe(fpr.to)+'".';return 'Reverse structural link '+_safe(a[1])+'.';}
    if(cmd==='unlinkMeasure'){return 'Remove association between Measure "'+_safe(_resolveMeasureTitle(a[1]))+'" and box "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='unlinkEQ'){return 'Remove association between Evaluation Question "'+_safe(_resolveEQText(a[1]))+'" and box "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='linkMeasure'){return 'Associate Measure "'+_safe(_resolveMeasureTitle(a[1]))+'" with box "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='linkEQ'){return 'Associate Evaluation Question "'+_safe(_resolveEQText(a[1]))+'" with box "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='addTTLink'){return 'Add structural link from "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='addHowLink'){return 'Add How link from "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to "'+_safe(_resolveAnyBoxLabel(a[2]))+'".';}
    if(cmd==='createMeasure'){return 'Create new Measure "'+_safe(a.slice(1).join(':'))+'".';}
    if(cmd==='createEQ'){return 'Create new Evaluation Question "'+_safe(a.slice(1).join(':'))+'".';}
    if(cmd==='setLight'){return 'Set status of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='setAllLights'){return 'Set status of all boxes to '+_safe(a[1])+'.';}
    if(cmd==='setSubpageLights'){return 'Set status of all boxes on page "'+_safe(_pageLabelById(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='setPriority'){return 'Set priority of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to '+_safe(a[2]||'(cleared)')+'.';}
    if(cmd==='setBoxBorder'){return 'Set border color of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='clearBoxBorder'){return 'Reset border color of box "'+_safe(_resolveAnyBoxLabel(a[1]))+'" to default.';}
    if(cmd==='setSubpageBorders'){return 'Set border color of all boxes on page "'+_safe(_pageLabelById(a[1]))+'" to '+_safe(a[2])+'.';}
    if(cmd==='clearSubpageBorders'){return 'Reset border color of all boxes on page "'+_safe(_pageLabelById(a[1]))+'" to default.';}
    if(cmd==='setDetail'){return 'Set detail text on box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='clearDetail'){return 'Clear detail text on box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addSofar'){return 'Add So-far entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote'){return 'Add My-Notes entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote1'){return 'Add Notes-1 entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote2'){return 'Add Notes-2 entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='addNote3'){return 'Add Notes-3 entry to box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='clearEntries'){return 'Clear '+_safe(a[2])+' entries on box "'+_safe(_resolveAnyBoxLabel(a[1]))+'".';}
    if(cmd==='setBoardInfo'){return 'Update Board info text.';}
    if(cmd==='setPageInfo'){var p=a[1];var lab=p==='overview'?'Overview':(p==='final'?'Final Outcomes':_pageLabelById(p));return 'Update Page info for "'+_safe(lab)+'".';}
    return _safe(a.join(' \u2192 '));
  }
  var html='<div style="margin:6px 0">';
  var nextN=SP.length+1;var i=0;
  while(i<actions.length){
    var a=actions[i];
    if(a[0]==='addSubpage'){
      var label=a[1]||'(untitled)';var pType=_pageTypeFromAddSubpage(a);var predictedId='p'+nextN;nextN++;
      var colsRenamed={};var colsAdded=[];var boxesAdded=[];var colsRemoved=0;
      var j=i+1;
      while(j<actions.length){
        var b=actions[j];
        if(b[0]==='addColumn' && b[1]===predictedId){colsAdded.push({idx:parseInt(b[2]),h:b.slice(3).join(':')});j++;}
        else if(b[0]==='renameColumn' && b[1]===predictedId){colsRenamed[parseInt(b[2])]=b.slice(3).join(':');j++;}
        else if(b[0]==='removeColumn' && b[1]===predictedId){colsRemoved++;j++;}
        else if(b[0]==='addBox' && b[1]===predictedId){boxesAdded.push({ci:parseInt(b[2]),label:b.slice(3).join(':')});j++;}
        else{break;}
      }
      var pTypeLabel=pType==='this_then'?'This\u2013Then':(pType==='how'?'How':(pType==='documentation'?'Documentation':pType));
      /* V1.0.14.0 (Fix 5): for This\u2013Then page proposals, decide whether this is a populated proposal or a blank/starter shell, and render a small status pill so the user sees at a glance which one they are about to confirm. A proposal is treated as populated if it adds any columns beyond the engine's default first column or adds any boxes; otherwise it is a blank/starter shell. */
      var statusPill='';
      if(pType==='this_then'){
        var isPopulated=(colsAdded.length>0 || boxesAdded.length>0);
        if(isPopulated){statusPill=' <span style="background:#22c55e;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:4px;letter-spacing:0.3px">POPULATED</span>';}
        else{statusPill=' <span style="background:#94a3b8;color:#fff;font-size:10px;font-weight:700;padding:1px 6px;border-radius:3px;margin-left:4px;letter-spacing:0.3px">BLANK/STARTER</span>';}
      }
      var line='<div style="margin-bottom:6px;line-height:1.5">\u2022 <b>Add new '+escHtml(pTypeLabel)+' page</b> '+escHtml('"'+label+'"')+statusPill;
      var colHeadings=[];
      if(pType==='this_then' || pType==='documentation'){
        colHeadings.push(colsRenamed[0]||'First Stage');
        var sortedAdds=colsAdded.slice().sort(function(x,y){return x.idx-y.idx;});
        sortedAdds.forEach(function(c){colHeadings.push(colsRenamed[c.idx]||c.h);});
        if(colsRemoved>0)colHeadings=colHeadings.slice(Math.min(colsRemoved,colHeadings.length-0));
      }else if(pType==='how'){
        colsAdded.forEach(function(c){colHeadings.push(c.h);});
      }
      if(colHeadings.length){line+=' \u2014 '+colHeadings.length+' column'+(colHeadings.length===1?'':'s')+': '+colHeadings.map(function(h){return escHtml(h);}).join(' \u2192 ');}
      if(pType==='this_then'){line+=' \u2014 '+boxesAdded.length+' box'+(boxesAdded.length===1?'':'es');}
      else if(pType==='how'){line+=' \u2014 default 8 How boxes';}
      else if(pType==='documentation' && boxesAdded.length){line+=' \u2014 '+boxesAdded.length+' box'+(boxesAdded.length===1?'':'es');}
      line+='</div>';html+=line;i=j;
    }else{
      html+='<div style="margin-bottom:4px;line-height:1.5">\u2022 '+_renderSingleAction(a)+'</div>';
      i++;
    }
  }
  /* V1.0.14.1b (Fix 6): if the response contains state actions alongside structural actions, render them in the same preview so the user confirms the FULL change set in one OK/Cancel. State-only responses still apply directly without ever calling this function. */
  if(stateActionsForPreview && stateActionsForPreview.length){
    for(var si=0;si<stateActionsForPreview.length;si++){
      html+='<div style="margin-bottom:4px;line-height:1.5">\u2022 '+_renderSingleAction(stateActionsForPreview[si])+'</div>';
    }
  }
  html+='</div>';
  return html;
}
function confirmStructural(ok){
  /* V1.0.14.1b (Fix 6): mixed-transaction commit. On OK we apply the queued pendingStateActions first (so they execute against the pre-structural state) then the queued pendingStructural; on Cancel we doUndo() to roll back to the snapshot taken in processAIResponse so neither the state changes nor the structural changes are partially applied. Both queues are cleared either way. */
  if(ok){
    if(pendingStateActions && pendingStateActions.length){pendingStateActions.forEach(function(a){execAction(a);});}
    if(pendingStructural && pendingStructural.length){pendingStructural.forEach(function(a){execAction(a);});}
  }else{
    doUndo();
  }
  pendingStateActions=[];
  pendingStructural=[];
  addChatMsg('system',ok?'Changes applied.':'Changes cancelled.');
}

function getMeasure(id){var nid=normalizeMeasureIdInput(id);return measures.find(m=>m.id===nid);}

function unlinkEQFromBox(eqId,boxKey){if(IS_READONLY)return;if(!B[boxKey]||!B[boxKey].evalQuestions)return;B[boxKey].evalQuestions=B[boxKey].evalQuestions.filter(id=>id!==eqId);saveState();render();}

function deleteMeasure(mId){if(IS_READONLY)return;const m=getMeasure(mId);if(!m)return;const linked=getBoxesLinkedToMeasure(mId);if(linked.length){const boxNames=linked.map(k=>B[k]?B[k].label:k).join(', ');if(!confirm('Measure '+m.id+' "'+m.title+'" is linked to '+linked.length+' box(es): '+boxNames+'.\n\nDeleting it will remove those links. Continue?'))return;}else{if(!confirm('Delete measure '+m.id+' "'+m.title+'"?'))return;}takeSnapshot();linked.forEach(k=>{if(B[k]&&B[k].measures)B[k].measures=B[k].measures.filter(id=>id!==mId);});ttLinks.forEach(function(l){if(l.measures)l.measures=l.measures.filter(function(id){return id!==mId;});});measures=measures.filter(x=>x.id!==mId);saveState();closeModal('measureDetailModal');closeModal('measuresRegistryModal');render();}

function getTaggedElement(kind,id){if(kind==='box')return B[id];if(kind==='ttLink')return (ttLinks||[]).find(function(l){return l.id===id;});if(kind==='howLink')return (howLinks||[]).find(function(l){return l.id===id;});if(kind==='measure')return getMeasure(id);if(kind==='eq')return getEQ(id);return null;}
function refreshTagPicker(kind,id,pickerId){var sel=document.getElementById(pickerId);if(!sel)return;var el=getTaggedElement(kind,id)||{tagIds:[]};var ids=cleanTagIds(el.tagIds||[]);var cur=sel.value;var opts='<option value="">Add tag…</option>';(tags||[]).forEach(function(t){if(!ids.includes(t.id)||t.id===cur)opts+='<option value="'+escAttr(t.id)+'">'+escHtml(normalizeTagShortLabel(t.shortLabel||''))+' — '+escHtml(t.label||'')+'</option>';});sel.innerHTML=opts;if(cur)sel.value=cur;}
function createInlineTagAndApply(kind,id,pickerId){if(IS_READONLY)return;var suffix=String(pickerId).replace(/[^A-Za-z0-9_]/g,'_');var sl=normalizeTagShortLabel((document.getElementById('newTagShort_'+suffix)||{}).value);var lab=String((document.getElementById('newTagLabel_'+suffix)||{}).value||'').trim();var desc=String((document.getElementById('newTagDesc_'+suffix)||{}).value||'').trim();if(!sl&&!lab){alert('Tag name cannot be empty.');return;}if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;var tag={id:_genUid('tag'),shortLabel:sl,label:lab,description:desc};tags.push(tag);var el=getTaggedElement(kind,id);if(el){if(!Array.isArray(el.tagIds))el.tagIds=[];if(!el.tagIds.includes(tag.id))el.tagIds.push(tag.id);}saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function addTagFromElementPicker(kind,id,pickerId){if(IS_READONLY)return;refreshTagPicker(kind,id,pickerId);var sel=document.getElementById(pickerId);var el=getTaggedElement(kind,id);if(!sel||!sel.value||!el)return;if(!Array.isArray(el.tagIds))el.tagIds=[];if(!el.tagIds.includes(sel.value))el.tagIds.push(sel.value);saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function removeTagFromElement(kind,id,tagId){if(IS_READONLY)return;var el=getTaggedElement(kind,id);if(!el||!Array.isArray(el.tagIds))return;el.tagIds=el.tagIds.filter(function(x){return x!==tagId;});saveState();render();if(kind==='measure')openMeasureDetail(id);else if(kind==='eq')openEQDetail(id);else if(kind==='ttLink'||kind==='howLink')openLinkDetail(id);else if(kind==='box')openEntryPanel(id);}
function addTagFromBoxPicker(key){var sel=document.getElementById('boxTagPicker');if(sel)addTagFromElementPicker('box',key,'boxTagPicker');}
function removeTagFromBox(key,tagId){removeTagFromElement('box',key,tagId);}
function removeDeletedTagFromAllElements(tagId){Object.keys(B||{}).forEach(function(k){if(B[k]&&Array.isArray(B[k].tagIds))B[k].tagIds=B[k].tagIds.filter(function(id){return id!==tagId;});});(ttLinks||[]).forEach(function(l){if(l&&Array.isArray(l.tagIds))l.tagIds=l.tagIds.filter(function(id){return id!==tagId;});});(howLinks||[]).forEach(function(l){if(l&&Array.isArray(l.tagIds))l.tagIds=l.tagIds.filter(function(id){return id!==tagId;});});(measures||[]).forEach(function(m){if(m&&Array.isArray(m.tagIds))m.tagIds=m.tagIds.filter(function(id){return id!==tagId;});});(evalQuestions||[]).forEach(function(q){if(q&&Array.isArray(q.tagIds))q.tagIds=q.tagIds.filter(function(id){return id!==tagId;});});}
function setTagValidation(msg){var el=document.getElementById('tagValidation');if(!el)return;el.textContent=msg||'';el.style.display=msg?'block':'none';}
function clearTagValidation(){setTagValidation('');}
function openTagsManager(){tagManagerDraft=JSON.parse(JSON.stringify(tags||[]));renderTagsManager();clearTagValidation();openModal('tagsModal');}
function renderTagsManager(){var el=document.getElementById('tagsList');if(!el)return;var list=tagManagerDraft||[];var html='';if(!list.length)html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No tags created yet.</div>';list.forEach(function(t,i){html+='<div class="tag-manager-row"><input class="tag-short-input ro-keep-editable" id="tagShort_'+i+'" maxlength="6" value="'+escAttr(normalizeTagShortLabel(t.shortLabel||''))+'" '+(IS_READONLY?'disabled':'')+'><input class="tag-label-input ro-keep-editable" id="tagLabel_'+i+'" value="'+escAttr(t.label||'')+'" placeholder="Tag name" '+(IS_READONLY?'disabled':'')+'><input class="tag-desc-input ro-keep-editable" id="tagDesc_'+i+'" value="'+escAttr(t.description||'')+'" placeholder="Description" '+(IS_READONLY?'disabled':'')+'><button class="tag-small-btn tag-del-btn tag-edit-only" onclick="deleteTagDraft('+i+')">Delete</button></div>';});el.innerHTML=html;var add=document.getElementById('tagsAddRow');if(add)add.style.display=IS_READONLY?'none':'block';}
function _syncTagDraftFromDOM(){if(!tagManagerDraft)return;tagManagerDraft.forEach(function(t,i){var sl=document.getElementById('tagShort_'+i),lab=document.getElementById('tagLabel_'+i),desc=document.getElementById('tagDesc_'+i);if(sl)t.shortLabel=normalizeTagShortLabel(sl.value);if(lab)t.label=String(lab.value||'').trim();if(desc)t.description=String(desc.value||'').trim();});}
function addTagDraftRow(){if(IS_READONLY)return;_syncTagDraftFromDOM();if(!tagManagerDraft)tagManagerDraft=JSON.parse(JSON.stringify(tags||[]));var sl=normalizeTagShortLabel((document.getElementById('newTagShort')||{}).value);var lab=String((document.getElementById('newTagLabel')||{}).value||'').trim();var desc=String((document.getElementById('newTagDesc')||{}).value||'').trim();if(!sl&&!lab){setTagValidation('Enter a tag name or short tag before adding.');var f=document.getElementById('newTagLabel')||document.getElementById('newTagShort');if(f&&f.focus)f.focus();return;}clearTagValidation();if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;tagManagerDraft.push({id:_genUid('tag'),shortLabel:sl,label:lab,description:desc});['newTagShort','newTagLabel','newTagDesc'].forEach(function(x){var e=document.getElementById(x);if(e)e.value='';});renderTagsManager();}
function deleteTagDraft(i){if(IS_READONLY)return;_syncTagDraftFromDOM();if(!tagManagerDraft)return;tagManagerDraft.splice(i,1);renderTagsManager();}
function saveTagsManager(){if(IS_READONLY){closeModal('tagsModal');return;}clearTagValidation();_syncTagDraftFromDOM();var oldIds=(tags||[]).map(function(t){return t.id;});var next=[];(tagManagerDraft||[]).forEach(function(t){var sl=normalizeTagShortLabel(t.shortLabel||'');var lab=String(t.label||'').trim();if(!sl&&!lab)return;if(!sl)sl=normalizeTagShortLabel(lab);if(!lab)lab=sl;next.push({id:t.id||_genUid('tag'),shortLabel:sl,label:lab,description:String(t.description||'').trim()});});var newIds={};next.forEach(function(t){newIds[t.id]=true;});oldIds.forEach(function(id){if(!newIds[id])removeDeletedTagFromAllElements(id);});tags=next;tagManagerDraft=null;saveState();closeModal('tagsModal');render();}
function cancelTagsManager(){tagManagerDraft=null;clearTagValidation();closeModal('tagsModal');}
function createTag(){addTagDraftRow();}
function saveTagRow(i){_syncTagDraftFromDOM();renderTagsManager();}
function deleteTag(tagId){if(IS_READONLY)return;if(!confirm('Delete this tag and remove it from all supported tagged elements?'))return;tags=tags.filter(function(t){return t.id!==tagId;});removeDeletedTagFromAllElements(tagId);saveState();renderTagsManager();render();}



function openMeasuresRegistry(){let html='';var cb=document.getElementById('measuresShowTags');if(cb)cb.checked=registryShowTags.measures!==false;if(!measures.length){html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No measures created yet.</div>';}else{measures.forEach(m=>{const cnt=getBoxesLinkedToMeasure(m.id).length;const status=cnt?cnt+' associated':'not associated';html+='<div class="meq-reg-item"><span class="meq-reg-id">'+displayMeasureId(m.id)+'</span><span class="meq-reg-title" onclick="closeModal(\'measuresRegistryModal\');openMeasureDetail(\''+m.id+'\')">'+escHtml(m.title)+(registryShowTags.measures===false?'':tagHTMLForElement(m))+'</span><span class="meq-reg-status">'+status+'</span><span class="meq-item-rm" onclick="event.stopPropagation();deleteMeasure(\''+m.id+'\')" title="Delete">✕</span></div>';});}document.getElementById('measuresRegistryList').innerHTML=html;openModal('measuresRegistryModal');}
function openEQRegistry(){let html='';var cb=document.getElementById('eqShowTags');if(cb)cb.checked=registryShowTags.eq!==false;if(!evalQuestions.length){html='<div style="color:var(--text2);font-style:italic;padding:8px 0">No evaluation questions created yet.</div>';}else{evalQuestions.forEach(q=>{const cnt=getBoxesLinkedToEQ(q.id).length;const status=cnt?cnt+' associated':'not associated';html+='<div class="meq-reg-item"><span class="meq-reg-id">'+displayEQId(q.id)+'</span><span class="meq-reg-title" onclick="closeModal(\'eqRegistryModal\');openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+(registryShowTags.eq===false?'':tagHTMLForElement(q))+'</span><span class="meq-reg-status">'+status+'</span><span class="meq-item-rm" onclick="event.stopPropagation();deleteEQ(\''+q.id+'\')" title="Delete">✕</span></div>';});}document.getElementById('eqRegistryList').innerHTML=html;openModal('eqRegistryModal');}
function createNewMeasureFromRegistry(){closeModal('measuresRegistryModal');createNewMeasure();}
function createNewEQFromRegistry(){closeModal('eqRegistryModal');createNewEQ();}
function toggleMeasuresListTags(){var cb=document.getElementById('measuresShowTags');registryShowTags.measures=!!(cb&&cb.checked);openMeasuresRegistry();}
function toggleEQListTags(){var cb=document.getElementById('eqShowTags');registryShowTags.eq=!!(cb&&cb.checked);openEQRegistry();}


function buildMeasuresSection(key){if(!B[key])return '';const box=B[key];const linked=box.measures||[];let items='';linked.forEach(mId=>{const m=getMeasure(mId);if(!m)return;items+='<div class="meq-item"><span class="meq-item-id">'+displayMeasureId(m.id)+'</span><span class="meq-item-title" onclick="openMeasureDetail(\''+m.id+'\')">'+escHtml(m.title)+tagHTMLForElement(m)+'</span><span class="meq-item-rm" onclick="unlinkMeasureFromBox(\''+m.id+'\',\''+key+'\')" title="Remove association">✕</span></div>';});
let opts='<option value="">Select measure…</option>';measures.forEach(m=>{if(!linked.includes(m.id))opts+='<option value="'+m.id+'">'+displayMeasureId(m.id)+' — '+escHtml(m.title)+'</option>';});
return '<div class="ep-section"><div class="ep-section-hdr">Measures</div>'+(items||'<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">No measures associated with this box.</div>')+'<div class="ep-compact-row"><select class="meq-sel" id="meqMPicker">'+opts+'</select><button class="meq-abtn" onclick="addMeasureFromPicker(\''+key+'\')" title="Associate with this box">Associate measure</button><span class="meq-footer-link" onclick="closeModal(\'linkDetailModal\');openMeasuresRegistry()">Manage measures</span></div></div>';}

function buildEQSection(key){if(!B[key])return '';const box=B[key];const linked=box.evalQuestions||[];let items='';linked.forEach(eqId=>{const q=getEQ(eqId);if(!q)return;items+='<div class="meq-item"><span class="meq-item-id">'+displayEQId(q.id)+'</span><span class="meq-item-title" onclick="openEQDetail(\''+q.id+'\')">'+escHtml(q.questionText)+tagHTMLForElement(q)+'</span><span class="meq-item-rm" onclick="unlinkEQFromBox(\''+q.id+'\',\''+key+'\')" title="Remove association">✕</span></div>';});
let opts='<option value="">Select evaluation question…</option>';evalQuestions.forEach(q=>{if(!linked.includes(q.id))opts+='<option value="'+q.id+'">'+displayEQId(q.id)+' — '+escHtml(q.questionText)+'</option>';});
return '<div class="ep-section"><div class="ep-section-hdr">Evaluation Questions</div>'+(items||'<div style="font-size:10px;color:var(--text2);font-style:italic;margin-bottom:4px">No evaluation questions associated with this box.</div>')+'<div class="ep-compact-row"><select class="meq-sel" id="meqEQPicker">'+opts+'</select><button class="meq-abtn" onclick="addEQFromPicker(\''+key+'\')" title="Associate with this box">Associate question</button><span class="meq-footer-link" onclick="closeModal(\'linkDetailModal\');openEQRegistry()">Manage evaluation questions</span></div></div>';}
