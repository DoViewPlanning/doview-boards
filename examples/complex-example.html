.bc-btn{width:18px;height:18px;border-radius:50%;cursor:pointer;border:1.5px solid var(--bdr);transition:transform 0.1s,border-color 0.1s;flex-shrink:0;padding:0;background-clip:padding-box}

/* V1.0.13.1 (Fix 4): small read-only display block placed above editable textareas in the link / measure / EQ / board info / page info popups. Renders the saved text via linkify() so URLs become clickable in display/view mode. Shown only when the saved field has content. The textarea below remains the edit surface; this block does not replace it. Styling is intentionally subtle — a softly-bordered block with a slightly recessed background — so users can tell at a glance which is the live (clickable) display and which is the (editable) textarea. */

.pri-row{display:flex;gap:5px;flex-wrap:wrap}

.pri-btn.pri-a{background:#0f172a;color:#fff;border-color:#0f172a}.pri-btn.pri-b{background:#334155;color:#fff;border-color:#334155}.pri-btn.pri-c{background:#64748b;color:#fff;border-color:#64748b}.pri-btn.pri-d{background:#cbd5e1;color:#1e293b;border-color:#cbd5e1}.pri-btn.pri-e{background:#e2e8f0;color:#334155;border-color:#cbd5e1}.pri-btn.pri-bau{background:#fff;color:#475569;border-color:#cbd5e1;font-size:8.5px}

/* V1.0.12.7 (Fix 8): selected/current-box emphasis strengthened modestly so the eye is drawn to the selected box, not to secondary grey linked boxes. Thicker dark border + subtle halo + gentle lift via shadow. Kept conservative; distinction with inspect-home (3px #1e293b + stronger shadow) and reveal-active (2px #475569, no halo) is preserved. Grey linked / inspect-linked boxes remain modestly styled as before. */
.box.box-selected{border:2px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.10),0 2px 8px rgba(0,0,0,0.10)!important;z-index:3}
.how-box.box-selected{border:2px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.10),0 2px 8px rgba(0,0,0,0.10)!important;z-index:3}
.fo-box.box-selected{border:2px solid #1e293b!important;box-shadow:0 0 0 2px rgba(30,41,59,0.10),0 2px 8px rgba(0,0,0,0.10)!important;z-index:3}
.box.reveal-out::before{content:'';position:absolute;left:-1px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:8px solid #475569;z-index:2}
.box.reveal-in::after{content:'';position:absolute;right:-9px;top:50%;transform:translateY(-50%);width:0;height:0;border-top:7px solid transparent;border-bottom:7px solid transparent;border-left:8px solid #475569;z-index:2}
.box.reveal-out-neg::before,.box.reveal-in-neg::after{border-left-color:#b91c1c!important}
.box.reveal-active{border:2px solid #475569!important}
.box.reveal-out::before,.box.reveal-in::after{cursor:pointer}
/* V1.0.12.8 (Fix 7): tooltip-bearing hover overlays for the small black reveal/link arrows. The arrows themselves are CSS pseudo-elements (::before / ::after) and cannot carry a title attribute, so these transparent overlay spans sit over the arrow area and carry the side-specific title tooltips. .reveal-arrow-hover-out covers the left-side arrow zone (this box results from the selected box); .reveal-arrow-hover-in covers the right-side arrow zone (this box makes the selected box happen). Positioned just outside the box edge so they do not intercept the existing in-box arrow-band click handler in clickBox. The DV_TIPS interceptor then picks up the title on hover. */
.reveal-arrow-hover-out{position:absolute;left:-14px;top:50%;transform:translateY(-50%);width:14px;height:18px;z-index:4;cursor:pointer;background:transparent}
.reveal-arrow-hover-in{position:absolute;right:-14px;top:50%;transform:translateY(-50%);width:14px;height:18px;z-index:4;cursor:pointer;background:transparent}

.src-ref-box .src-ref-affordances .tt-cnt-l,.src-ref-box .src-ref-affordances .tt-cnt-empty.tt-cnt-l{left:-8px!important;right:auto!important;top:50%!important;bottom:auto!important;transform:translateY(-50%)!important}
.src-ref-box .src-ref-affordances .tt-cnt-r,.src-ref-box .src-ref-affordances .tt-cnt-empty.tt-cnt-r{right:-8px!important;left:auto!important;top:50%!important;bottom:auto!important;transform:translateY(-50%)!important}
/* V1.0.17.14: backward guard for malformed empty side classes created by the earlier replacement bug. */
.src-ref-box .src-ref-affordances .tt-cnt-empty-l{left:-8px!important;right:auto!important;top:50%!important;bottom:auto!important;transform:translateY(-50%)!important}
.src-ref-box .src-ref-affordances .tt-cnt-empty-r{right:-8px!important;left:auto!important;top:50%!important;bottom:auto!important;transform:translateY(-50%)!important}
/* V1.0.12.7 (Fix 6): custom tooltip. Replaces native title-based tooltips so they appear faster and are larger and easier to read. Kept compact, unobtrusive, and stable. The tooltip system (see DV_TIPS script below) intercepts the native title attribute on hover, hides the native tooltip, and shows this styled element after a short delay. */
.dv-tip{position:fixed;z-index:9999;background:#1e293b;color:#fff;padding:7px 11px;border-radius:6px;font-size:12.5px;font-weight:500;line-height:1.45;max-width:280px;box-shadow:0 3px 12px rgba(0,0,0,0.28);pointer-events:none;display:none;white-space:normal;letter-spacing:0.1px}
/* V1.0.12.9b (Fixes 2 + 3): read-only copy styling. The .is-readonly class is applied to <body> when the board is loaded from an embedded state carrying isReadonly:true. It hides edit-oriented controls throughout the UI while preserving navigation, search, print, view settings, and other viewing functions. Keep modest \u2014 a small outline pill label near the board title, dimmed/hidden buttons, and hidden chat. Non-alarmist styling. */
/* V1.0.12.9c (Fix 1): Read-only copy label was previously rendered inside .hdr-right above the tagline as a translucent outline pill. */
/* V1.0.14.1a (Fix 1): the Read-Only Copy label is moved back to the left side of the header, rendered left-justified directly under the board title inside .hdr-title-wrap. The styling is intentionally modest \u2014 small, low-contrast, single line, no pill, no uppercase spacing, no warning-banner appearance \u2014 so it reads as a quiet mode indicator rather than a security guarantee. The honest tooltip clarifies that read-only copies are a UI-only restriction and not security protection. */
/* V1.0.14.1b (Fix 3): the Read-Only label is restyled as a modest pill and moved inline with the top utility links (alongside Board info, Measures, \u2026, Get training) rather than sitting under the title. The label text is "Read-Only Board" and reads as a status pill, not a clickable link or a warning banner. The font size is slightly larger than the previous tiny label so it stands out modestly without dominating; the subtle white outline + transparent background and small horizontal padding give it pill shape; cursor:help signals hover reveals the tooltip; user-select:none makes it feel like a status, not text. The honest tooltip remains unchanged ("Editing is disabled through the board interface. This is not security protection; someone with technical skills could still edit the HTML."). Display is gated by body.is-readonly so editable boards never show it. */
.ro-label{display:none;font-size:12px;color:#fff;font-weight:700;line-height:1.2;white-space:nowrap;padding:6px 12px;letter-spacing:0.1px;text-transform:none;background:rgba(255,255,255,0.12);border:1.5px solid rgba(255,255,255,0.88);border-radius:999px;cursor:help;user-select:none;align-self:center}
body.is-readonly .ro-label{display:inline-flex;align-items:center;justify-content:center}
/* V1.0.55.0: in read-only Presentation View, the read-only status pill is also shown in the presentation top bar immediately to the left of Normal View. */
.presentation-bar .ro-label{margin-right:2px;background:rgba(255,255,255,0.14);border-color:rgba(255,255,255,0.78)}
.tag-validation{display:none;color:#b91c1c;background:#fef2f2;border:1px solid #fecaca;border-radius:6px;padding:7px 9px;font-size:12px;line-height:1.35;margin-top:7px;font-weight:600}
body.is-readonly .chat-fab,body.is-readonly .chat-panel{display:none!important}
body.is-readonly #saveBtn2,body.is-readonly #newBoardBtn,body.is-readonly #createReadOnlyCopyBtn{display:none!important}
body.is-readonly .how-add-btn{display:none!important}
body.is-readonly .ep-struct{display:none!important}
/* V1.0.15.1 (Fix 2): the V1.0.15.0 rule body.is-readonly #epWrap{display:none!important} prevented the bottom details panel from opening in read-only copies, so a reader could not click a box to inspect its details. That rule has been removed; #epWrap now opens normally in read-only mode. Editing controls inside the panel are gated by the more targeted rules below — the entry-input textarea (#epTa), the mode-pill row (.ep-add), the Save button area (.ep-acts), the Status / Priority / Border picker row (.ep-controls), and the This–Then link picker row (.tt-link-add) are hidden so the panel reads as view-only, while the box label, Notes 1 / Notes entries, the Display text section, the Jump-to-page section heading, the associated Measures list, the associated Evaluation Questions list, and structural This\u2013Then / How link rows remain visible for inspection. The existing .ep-edit / .ep-struct / .meq-item-rm / .tt-link-rm / .how-link-rm / .meq-add / .how-link-add / .ep-sbtn.ep-del rules continue to gate per-row remove \u00d7 buttons and picker rows. */
body.is-readonly .ep-controls-edit,body.is-readonly .ep-add,body.is-readonly #epTa,body.is-readonly .ep-acts,body.is-readonly .tt-link-add{display:none!important}
body.is-readonly .tab-add-btn{display:none!important}
body.is-readonly .pi-link[onclick*="movePageLeft"],body.is-readonly .pi-link[onclick*="confirmDeletePage"],body.is-readonly .pi-undo,body.is-readonly .pi-link[onclick*="openPageInfo"]{display:none!important}
/* Keep Page info clickable (view-only) — editing is gated in savePageInfo. Hide move/delete/undo. */
body.is-readonly .pi-link[onclick*="openPageInfo"]{display:inline!important}
body.is-readonly .how-level-controls{display:none!important}
body.is-readonly .ep-edit{display:none!important}
body.is-readonly .doc-edit-bar,body.is-readonly .doc-save-bar,body.is-readonly .doc-toolbar{display:none!important}
body.is-readonly #srcModal button[onclick*="addNewSourceRow"],body.is-readonly #srcModal button[onclick*="saveSources"]{display:none!important}
/* V1.0.12.9c (Fix 2): button[onclick="saveViewPanel()"] is intentionally NOT hidden in read-only mode \u2014 changing View is a display/viewing change, not a content edit, and saveViewPanel() now runs in read-only mode (saveState() is a no-op in read-only so nothing persists past the session). The other Save-style buttons remain hidden because they would edit board content. */
body.is-readonly button[onclick="saveBoardInfo()"],body.is-readonly button[onclick="savePageInfo()"],body.is-readonly button[onclick="saveMeasureDetail()"],body.is-readonly button[onclick="saveEQDetail()"],body.is-readonly button[onclick="saveLinkDetail()"],body.is-readonly button[onclick="doInsertClone()"],body.is-readonly button[onclick="saveTopRightText()"],body.is-readonly button[onclick="clearTopRightText()"]{display:none!important}
/* V1.0.14.1a (Fix 5): in read-only copies, Board info / Page info open in rendered view mode only. The Edit and Cancel buttons (which would expose the textarea + Save) are hidden, so the popup shows only the rendered view of the saved text plus the Close button. URLs in the rendered view remain clickable. */
body.is-readonly button[onclick="boardInfoStartEdit()"],body.is-readonly button[onclick="boardInfoCancelEdit()"],body.is-readonly button[onclick="pageInfoStartEdit()"],body.is-readonly button[onclick="pageInfoCancelEdit()"]{display:none!important}
body.is-readonly .meq-reg-toolbar,body.is-readonly .meq-footer,body.is-readonly .meq-add,body.is-readonly .how-link-add,body.is-readonly .ep-sbtn.ep-del,body.is-readonly .meq-item-rm,body.is-readonly .tt-link-rm,body.is-readonly .how-link-rm,body.is-readonly .doc-clone-rm,body.is-readonly .src-ref-close{display:none!important}
body.is-readonly .pri-badge,body.is-readonly .tl-dot{cursor:default}
/* Keep dots/badges displayed (view-only) \u2014 their click-to-edit popups are gated in openTLChooser / openPriChooser. */
body.is-readonly .box-chooser{display:none!important}
/* V1.0.12.9c (Fix 3): in a read-only copy, popup textareas and text inputs are made non-editable via the readOnly attribute set by applyReadonlyToModal() (called from openModal). These CSS rules back that up with visual styling that reads as non-editable at a glance \u2014 dimmed background, default (non-text) cursor, neutralised focus ring \u2014 so the UI does not imply editability when none is possible. Contenteditable regions (such as the doc-page editor, should it ever render in read-only mode) are also visually locked down. Search/filename inputs are excluded via the .ro-keep-editable escape hatch so viewing/filtering inputs still feel live. */
body.is-readonly .modal-ov textarea[readonly],body.is-readonly .modal-ov input[type="text"][readonly]{background:#eef2f6!important;cursor:default!important;color:var(--text)}
body.is-readonly .modal-ov textarea[readonly]:focus,body.is-readonly .modal-ov input[type="text"][readonly]:focus{outline:none!important;border-color:var(--bdr)!important;box-shadow:none!important}
body.is-readonly .modal-ov [contenteditable="false"]{cursor:default}
body.is-readonly .modal-ov .ro-keep-editable{background:#f8fafc!important;cursor:text!important}
/* V1.0.12.10 (Fix 1): coherent non-box UI scaling. The board area (.main) already uses zoom:var(--board-scale) so boxes and on-board chrome (page bars, under-box details, etc.) scale together. Previously, the non-box UI/chrome sat outside .main at 1x, so header/tab-bar/page-info-bar/control-bar/attribution and all popups/modals/tooltip/save-toast/chat elements felt disproportionately small once the board was scaled. Each of these containers now participates in the same scaling logic via zoom:var(--board-scale), so the whole interface scales together. For fixed-size popups/modals/tooltip/chat panel, max-width/max-height/width/height are divided by --board-scale so their visible on-screen footprint stays consistent with pre-fix behavior while internal text scales coherently. The on-board box-chooser popup is appended inside #main and therefore keeps inheriting .main's zoom as before — no change needed. CSS zoom is already in use for .main, so relying on zoom here is consistent with the existing approach and avoids scattering many per-element font-size tweaks. */
/* V1.0.12.11 (Fix 1): main popup/modal scaling decoupled from board scale so popup size can be tuned independently. The main modal (.modal-box), the measure/evaluation-question detail modal sizing, and the page-type chooser box (.ptc-box) now use --popup-scale instead of --board-scale. This makes popup text comfortably readable (as in V1.0.12.10) while being slightly less oversized than before. The main popup/modal width base is also widened from 660px to 820px (still divided by --popup-scale), so right-side controls like Add are visible without horizontal scrolling. Tooltip (.dv-tip) and other non-popup chrome (.hdr, .tab-bar, .page-info-bar, .ctrl-bar, .attr, .save-toast, .chat-fab, .chat-panel) remain on --board-scale and are unchanged. Board scale (--board-scale) itself is unchanged. */
/* V1.0.12.12 (Fix 1): main popup/modal width base increased from 820px to 1200px (still divided by --popup-scale) so the full popup is visible without sideways truncation and right-side controls such as Add are reachable without horizontal scrolling. Only .modal-box max-width changes here — --popup-scale itself is unchanged, .meq-detail-modal .modal-box and .ptc-box keep their existing max-width bases, and the popup heading size change lives with the .modal-box h3 rule earlier in the CSS. */
.hdr{zoom:var(--board-scale)}
.tab-bar{zoom:var(--board-scale)}
.page-info-bar{zoom:var(--board-scale)}
.ctrl-bar{zoom:var(--board-scale)}
.attr{zoom:var(--board-scale)}
.modal-box{zoom:var(--popup-scale);max-width:calc(1200px / var(--popup-scale));max-height:calc(82vh / var(--popup-scale))}
.meq-detail-modal .modal-box{max-width:calc(520px / var(--popup-scale))}
.ptc-box{zoom:var(--popup-scale);max-width:calc(400px / var(--popup-scale))}
.dv-tip{zoom:var(--board-scale);max-width:calc(280px / var(--board-scale))}
.save-toast{zoom:var(--board-scale)}
.chat-fab{zoom:var(--board-scale)}
.chat-panel{zoom:var(--board-scale);width:calc(500px / var(--board-scale));max-width:calc((100vw - 44px) / var(--board-scale));height:calc(620px / var(--board-scale));max-height:calc((100vh - 165px) / var(--board-scale))}
/* V1.0.12.13 (Fix 1): inner detail/edit popup content width fix. Previously the outer .modal-box was widened (V1.0.12.12) and the inline detail/entry panel (.ep) was rendered inside #epWrap inside .main, but the inner .ep panel had no explicit width and some inner rows (.ep-add, .ep-struct, .meq-add) could push right-side controls such as Add off the visible area, requiring horizontal scrolling. The fix targets only the inner edit/detail popup content: .ep is forced to use the available width with width:100% and max-width:none; .ep-ta is reinforced at width:100% (already so); .ep-add and .ep-struct keep their existing flex-wrap:wrap and now also have max-width:100% so they wrap rather than overflow; .meq-add (the picker+Add row inside Measure/Evaluation Question/Link detail modals) gets flex-wrap:wrap + max-width:100% for the same reason; .meq-section (parent of meq-add and meq-item rows) is constrained to max-width:100%. No outer modal width change here — that lives with the V1.0.12.12 .modal-box rule earlier. No popup-scale change. No board-scale change. No schema, state, link, read-only, or interaction changes. */
.ep{width:100%;max-width:none}
.ep-ta{width:100%}
.ep-add{flex-wrap:wrap;max-width:100%}
.ep-struct{flex-wrap:wrap;max-width:100%}
.meq-add{flex-wrap:wrap;max-width:100%}
.meq-section{max-width:100%}
/* V1.0.13.0 (Fix A): This–Then / How link popup overflow. The V1.0.12.13 fix above targeted the .ep / detail-panel classes, but the remaining overflow problem was specifically the This–Then / How link popup, where the inner row containing the dropdown/select and the Add button could still push the Add button off to the right and require horizontal scrolling. The fix targets the actual link-popup rows (the .tt-link-add and .how-link-add rows used by buildTTLinkPicker, buildHowActingOnPicker, buildHowLinkTTPicker, buildHowLinkHowPicker, buildLateralHowOnTTPopupPicker, etc., plus the .meq-add picker+Add rows used inside the Link detail popup buildLinkMeasuresSection / buildLinkEQSection): .tt-link-add and .how-link-add now have flex-wrap:wrap + max-width:100% (parallel to the V1.0.12.13 .ep-add / .ep-struct / .meq-add fix) so they wrap rather than overflow at narrow widths; .tt-link-section and .how-link-section are constrained to max-width:100% as their containers; and .tt-link-sel, .how-link-sel, and .meq-sel get min-width:0 + max-width:100% so the select itself can shrink below its widest option text rather than forcing the row wider than its container — without min-width:0, a flex item's default min-width:auto resolves to min-content and prevents shrink even with flex:1 + flex-shrink:1. No outer modal width change; no popup-scale change beyond the V1.0.13.0 (Fix D) default board-scale change in :root; no schema, state, link, read-only, or interaction changes. */
.tt-link-add{flex-wrap:wrap;max-width:100%}
.how-link-add{flex-wrap:wrap;max-width:100%}
.tt-link-section{max-width:100%}
.how-link-section{max-width:100%}
.tt-link-sel{min-width:0;max-width:100%}
.how-link-sel{min-width:0;max-width:100%}
.meq-sel{min-width:0;max-width:100%}
/* V1.0.12.13 (Fix 2): board-level Top right text styling for the page-info bar. The page-info bar's left content stays as-is in #pageInfoBarLeft; #pageInfoBarRight floats to the right and right-aligns the optional Top right text or the modest "+ Add top right text" affordance shown when no Top right text exists. The Top right text is plain text only (no rich text, no links). Truncated with ellipsis and capped at a sensible max-width so long text does not crowd out page controls on narrow viewports. In read-only copies the text is visible (via the same .pi-right-text class) but the click handler is gated by IS_READONLY so it cannot be edited. The "+ Add top right text" affordance is hidden in read-only copies via body.is-readonly. */
.pi-bar-flex{display:flex;align-items:center;gap:6px;width:100%}
.pi-bar-left{flex:1;min-width:0}
.pi-bar-right{margin-left:auto;display:flex;align-items:center;gap:6px;flex-shrink:0;text-align:right;justify-content:flex-end}
.pi-right-text{font-size:13.5px;font-style:italic;color:var(--text2);max-width:320px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;padding:1px 4px;border-radius:4px}
.pi-right-text:hover{color:var(--text);background:#f1f5f9}
body.is-readonly .pi-right-text{cursor:default}
body.is-readonly .pi-right-text:hover{color:var(--text2);background:transparent}
.pi-right-add{font-size:12px;color:var(--text2);cursor:pointer;font-style:italic;opacity:0.7;padding:1px 4px;border-radius:4px}
.pi-right-add:hover{opacity:1;color:var(--text);background:#f1f5f9}
body.is-readonly .pi-right-add{display:none!important}
/* V1.0.12.13 (Fix 3): text-only Official DoView Badge Standards-Compliant Board Structure in the top-right of the orange header. Sits underneath the existing SEE. PLAN. DO.™ + version line, using the second and third rows of the .hdr-right block. White text, white rounded border, orange background matching the top bar, compact and readable. No logo, no icon — text only. Non-editable. Click opens a non-editable info popup. Appears in normal editable boards and read-only copies. (V1.0.15.0 (Fix 3): badge wording reordered from "Standards-Compliant Board Structure Badge" to "Badge Standards-Compliant Board Structure" — line 1 now reads "Official DoView® Badge" and line 2 reads "Standards-Compliant Board Structure". Internal CSS class names and code-side identifiers are intentionally left unchanged to keep the change wording-only.) */
.hdr-badge{display:inline-flex;flex-direction:column;align-items:center;justify-content:center;background:var(--orange);color:#fff;border:1.5px solid #fff;border-radius:8px;padding:5px 12px;margin-top:5px;font-weight:700;line-height:1.25;cursor:pointer;text-align:center;letter-spacing:0.2px}

<div class="modal-ov" id="infoModal"><div class="modal-box"><h3>Info for developers</h3><p style="font-size:14px;line-height:1.7;color:var(--text2)">DoView boards are a proven approach to planning that can be adapted to any topic, context, or scale, and are shaped by thousands of real-world applications. Behind the simplicity of the This–Then layout is a robust conceptual foundation in outcomes theory, helping ensure that what gets built is not just visually clear but analytically sound.<br><br>The main website for DoView Boards and DoView Planning is <a href="https://doviewplanning.org" target="_blank">DoViewPlanning.org</a>. You can find information about the approach and many examples of boards there. You can find our GitHub at <a href="https://doviewplanning.org/doviewboards" target="_blank">DoViewPlanning.org/DoViewBoards</a>. It includes the DoView Board minimum specification, developer integration guidance, configuration reference material, and other resources for building DoView-compatible boards, apps, platforms, and systems.<br><br>Developers are encouraged to implement, extend, and build DoView-compatible boards within any app, platform, or system, with acknowledgment. Details are at <a href="https://doviewplanning.org/trademarkuse" target="_blank">DoViewPlanning.org/trademarkuse</a>.<br><br>The GitHub also includes the example reference JavaScript engine that created this DoView Board, a prompt for building PowerPoint DoViews, our Gartner Cool Vendor award-winning DoView legacy app, examples of DoView Boards, and other resources.<br><br>Thinking more broadly, DoView Boards could potentially be used as a GUI “intent engineering” interface for building and controlling agentic systems, and perhaps by agentic systems themselves to plan and coordinate their activity if you want to develop them further in this direction.<br><br>DoViews are drawn to a specific standard so they are fit for purpose, as set out in the DoView Boards minimum standard. Please follow this basic standard for how DoView Boards are structured and presented, and innovate as much as you like on top of it. If you put DoView Boards into any app, platform, or system, please let us know if you are able.<br><br>The Official DoView® Badge: Standards-Compliant Board Structure is separate from general DoView-compatible use. If you want your app, platform, or system to use the Official DoView® Badge, please contact us at <a href="https://doviewplanning.org/contact" target="_blank">DoViewPlanning.org/contact</a>.<br><br>If you want conceptual help implementing or extending DoView Boards, please contact us through <a href="https://doviewplanning.org" target="_blank">DoViewPlanning.org</a>. You can also see projects where we would like to collaborate with developers at <a href="https://doviewplanning.org/collaborate" target="_blank">DoViewPlanning.org/collaborate</a>.</p><button class="modal-close" onclick="closeModal('infoModal')">Close</button></div></div>

/* V1.0.15.2 (Fix 1, Fix 3): linkify is the low-level helper that assumes its input is already HTML-safe. It is called on already-escaped text by linkifyDisplay (V1.0.13.1 (Fix 4)), renderMd, linkifyDocHtml, and the under-box display. Call sites that pass RAW user-entered text into linkify (e.g. the bottom details panel entry rows in renderEntryPanel) are switched to linkifyDisplay so the < > & in user text render as literal characters before URL detection. The linkify regex still only matches ordinary http(s) URLs, mailto:, and bare domains with a TLD allowlist, so dangerous schemes (JavaScript:, data:, vbscript:) are not matched and so are not made clickable. Generated anchors for http(s) URLs and bare domains now use rel="noopener noreferrer" (previously rel="noopener") so opened tabs cannot reference window.opener and referrers are not leaked. target="_blank" is preserved. The mailto: branch is unchanged for backward compatibility. */

function resolveCloneText(type,key){
  if(type==='page_title'){if(key==='final')return 'Final Outcomes';const sp=SP.find(s=>s.id===key);return sp?sp.label:null;}
  if(type==='box_title'){const b=B[key];return b?b.label:null;}
  if(type==='box_main_text'){const b=B[key];return b?(b.label+': '+(b.detailText||'(no main text)')):null;}
  if(type==='measure'){const m=getMeasure(key);return m?m.id+' '+m.title:null;}
  if(type==='eval_question'){const q=getEQ(key);return q?q.id+' '+q.questionText:null;}
  if(type==='link'){const l=ttLinks.find(x=>x.id===key)||howLinks.find(x=>x.id===key);if(!l)return null;const fb=B[l.from],tb=B[l.to];if(!fb||!tb)return null;return (fb.label)+' \u2192 '+(tb.label);}
  return null;
}
function cloneTypeLabel(type){
  if(type==='page_title')return 'Page title';if(type==='box_title')return 'Box title';if(type==='box_main_text')return 'Box display text';if(type==='measure')return 'Measure';if(type==='eval_question')return 'Evaluation Question';if(type==='link')return 'Link';return 'Clone';
}
function sanitizeDocClones(html){
  if(!html)return html;
  return html.replace(/<div class="doc-clone[^"]*"([^>]*)>[\s\S]*?<\/div>/g,function(match,attrs){
    var typeM=attrs.match(/data-clone-type="([^"]*)"/);var keyM=attrs.match(/data-clone-key="([^"]*)"/);
    if(!typeM||!keyM)return '';
    return '<div class="doc-clone" data-clone-type="'+typeM[1]+'" data-clone-key="'+keyM[1]+'"></div>';
  });
}
function linkifyDocHtml(html){if(!html)return html;var d=document.createElement('div');d.innerHTML=html;function walkText(node){if(node.nodeType===3){var t=node.textContent;var linked=linkify(t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'));if(linked!==t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')){var span=document.createElement('span');span.innerHTML=linked;node.parentNode.replaceChild(span,node);}}else if(node.nodeType===1&&node.tagName!=='A'&&!node.classList.contains('doc-clone')){var children=Array.from(node.childNodes);children.forEach(walkText);}}walkText(d);return d.innerHTML;}
function resolveDocClones(html){
  if(!html)return html;
  return html.replace(/<div class="doc-clone[^"]*"([^>]*)>[\s\S]*?<\/div>/g,function(match,attrs){
    var typeM=attrs.match(/data-clone-type="([^"]*)"/);var keyM=attrs.match(/data-clone-key="([^"]*)"/);
    if(!typeM||!keyM)return match;
    var type=typeM[1],key=keyM[1];var text=resolveCloneText(type,key);
    var label=cloneTypeLabel(type);
    if(text===null)return '<div class="doc-clone doc-clone-broken" data-clone-type="'+type+'" data-clone-key="'+key+'"><span class="doc-clone-label">'+escHtml(label)+' (missing)</span> [Source deleted]</div>';
    var clickAction=cloneClickAction(type,key);
    return '<div class="doc-clone" data-clone-type="'+type+'" data-clone-key="'+key+'" onclick="'+clickAction+'"><span class="doc-clone-label">'+escHtml(label)+'</span> '+escHtml(text)+'</div>';
  });
}
function resolveDocClonesForEdit(html){
  if(!html)return html;
  return html.replace(/<div class="doc-clone[^"]*"([^>]*)>[\s\S]*?<\/div>/g,function(match,attrs){
    var typeM=attrs.match(/data-clone-type="([^"]*)"/);var keyM=attrs.match(/data-clone-key="([^"]*)"/);
    if(!typeM||!keyM)return match;
    var type=typeM[1],key=keyM[1];var text=resolveCloneText(type,key);
    var label=cloneTypeLabel(type);
    if(text===null)return '<div class="doc-clone doc-clone-broken" data-clone-type="'+type+'" data-clone-key="'+key+'" contenteditable="false"><span class="doc-clone-label">'+escHtml(label)+' (missing)</span> [Source deleted] <span class="doc-clone-rm" onclick="event.stopPropagation();removeCloneBlock(this.parentElement)" title="Remove clone">\u2715</span></div>';
    return '<div class="doc-clone" data-clone-type="'+type+'" data-clone-key="'+key+'" contenteditable="false"><span class="doc-clone-label">'+escHtml(label)+'</span> '+escHtml(text)+' <span class="doc-clone-rm" onclick="event.stopPropagation();removeCloneBlock(this.parentElement)" title="Remove clone">\u2715</span></div>';
  });
}
function cloneClickAction(type,key){
  if(type==='page_title'){return "navTo('"+key+"')";}

  else if(cmd==='addSubpage'&&parts.length>=2){const wasSingle=SP.length===1;const label=parts[1];let pType='this_then';if(parts.length>=3&&!parts[2].startsWith('#')&&['this_then','how','documentation'].includes(parts[2])){pType=parts[2];}let bg,bdr,tab;const colorStart=pType!=='this_then'?3:2;if(parts.length>=colorStart+3){bg=parts[colorStart];bdr=parts[colorStart+1];tab=parts[colorStart+2];}else{const usedBgs=SP.map(s=>(s.color||DEFAULT_COLOR).bg);const avail=COL_COLORS.find(c=>!usedBgs.includes(c.bg))||COL_COLORS[SP.length%COL_COLORS.length];bg=avail.bg;bdr=avail.bdr;tab=avail.tab;}const id='p'+(SP.length+1);/* V1.0.14.2 (Fix 5): stable uid on the new page. */const _pageUid=_genUid('page');if(pType==='how'){const howBoxes=[];for(let i=1;i<=8;i++){const hid='H'+String(i).padStart(3,'0');/* V1.0.14.2 (Fix 5): stable uid on each starter How box record. */howBoxes.push({id:hid,label:'How (action, person, team, unit, organization, capability, \u2026)',uid:_genUid('box')});}SP.push({id,label,pageType:'how',color:{bg,bdr,tab},cols:[],howBoxes,nextHowNum:9,howLevel:SP.filter(s=>s.pageType==='how').length+1,uid:_pageUid});howBoxes.forEach(hb=>{B[`${id}-${hb.id}`]={label:hb.label,light:'grey',entries:[],priority:'',hasSubpage:false,detailText:'',borderColor:'',boxColor:'',tagIds:[],uid:hb.uid};});}else{/* V1.0.14.2 (Fix 5): stable uid on the default first column of a new this_then / documentation page. */SP.push({id,label,pageType:pType,color:{bg,bdr,tab},cols:[{h:'First Stage',boxes:[],uid:_genUid('col')}],uid:_pageUid});}if(wasSingle){addChatMsg('system','This is now a multi-page board. The overview page has been added and the original page now uses a single color scheme to match the overview tiles.');currentPage='overview';}buildDepsMap();saveState();render();}
